# GitLeaks configuration for Qobuzarr
# Uses default ruleset with allowlist for test files

title = "Qobuzarr Security Configuration"

[extend]
useDefault = true

[allowlist]
description = "Allow test files, documentation, and CI scripts"
paths = [
    '''\.claude/''',
    '''docs/''',
    '''wiki/''',
    '''README\.md''',
    # Test files with fixture data
    '''tests/.*\.cs''',
    '''tests/.*\.json''',
    # CI/CD scripts with cache keys
    '''\.github/.*''',
    '''scripts/.*''',
    '''.*\.ps1''',
    '''.*\.sh''',
]
regexes = [
    '''(test_password|example_password|dummy_secret|placeholder_key)''',
    '''your_app_(id|secret)|your@email\.com|your_password''',
    '''QOBUZ_(APP_ID|APP_SECRET|EMAIL|PASSWORD)''',
    '''user_auth_token=(test|fake|REDACTED|mock)''',
    # CI cache keys (not secrets)
    '''LIDARR_CACHE_KEY''',
    '''lidarrCacheKey''',
    '''cacheKey''',
    # Lidarr API key env var references
    '''LIDARR_API_KEY''',
]
