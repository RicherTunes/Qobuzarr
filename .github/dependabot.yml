version: 2
updates:
  # Enable version updates for .NET/NuGet packages
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    target-branch: "develop"
    reviewers:
      - "richertunes"
    assignees:
      - "richertunes"
    labels:
      - "dependencies"
      - "automated"
      - "nuget"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    ignore:
      # Host-boundary packages: types cross plugin<->host boundary via NzbDrone APIs.
      # ANY version change causes type-identity conflicts at runtime.
      # Only bump when the Lidarr host itself upgrades first.
      - dependency-name: "NLog"
        versions: [">=5.5.0"]
      - dependency-name: "FluentValidation"
        versions: [">=12.0.0"]
      # FluentAssertions 7.x+ changed to commercial license.
      # Pin at 6.12.2 (last MIT release). See TECH_DEBT.md.
      - dependency-name: "FluentAssertions"
        versions: [">=7.0.0"]
      - dependency-name: "Microsoft.Extensions.DependencyInjection"
        versions: [">=9.0.0"]
      - dependency-name: "Microsoft.Extensions.DependencyInjection.Abstractions"
        versions: [">=9.0.0"]
      - dependency-name: "Microsoft.Extensions.Logging.Abstractions"
        versions: [">=9.0.0"]
      - dependency-name: "System.Text.Json"
        versions: [">=9.0.0"]
    allow:
      # Allow all dependency types
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # Enable version updates for CLI project specifically  
  - package-ecosystem: "nuget"
    directory: "/QobuzCLI/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "UTC"
    open-pull-requests-limit: 5
    target-branch: "develop"
    reviewers:
      - "richertunes"
    assignees:
      - "richertunes"
    labels:
      - "dependencies"
      - "automated"
      - "nuget"
      - "cli"
    commit-message:
      prefix: "deps(cli)"
      include: "scope"
    ignore:
      # Be more conservative with CLI dependencies
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Enable version updates for test projects
  - package-ecosystem: "nuget"
    directory: "/tests/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    target-branch: "develop"
    reviewers:
      - "richertunes"
    assignees:
      - "richertunes"
    labels:
      - "dependencies"
      - "automated"
      - "nuget" 
      - "tests"
    commit-message:
      prefix: "deps(test)"
      include: "scope"
    allow:
      # Be more permissive with test dependencies
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    target-branch: "develop"
    reviewers:
      - "richertunes"
    assignees:
      - "richertunes"
    labels:
      - "dependencies"
      - "automated"
      - "github-actions"
      - "ci-cd"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"

  # Docker dependencies (if any Dockerfiles exist)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    target-branch: "develop"
    reviewers:
      - "richertunes"
    assignees:
      - "richertunes"
    labels:
      - "dependencies"
      - "automated"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"