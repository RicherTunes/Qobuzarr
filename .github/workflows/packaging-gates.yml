name: Packaging Gates

on:
  schedule:
    - cron: '40 4 * * *'  # 04:40 UTC daily — staggered across ecosystem (Brainarr+10m)
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: packaging-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packaging-gates:
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/packaging-gates.yml@1fe2da1cfb6397361a665449f39db72887a72334
    with:
      common-path: ext/Lidarr.Plugin.Common
      plugin-csproj: Qobuzarr.csproj
      manifest-path: plugin.json
      host-assemblies-path: ext/Lidarr/_output/net8.0
      lidarr-docker-version: pr-plugins-2.14.2.4786
      parity-lint: false
