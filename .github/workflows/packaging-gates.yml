name: Packaging Gates

on:
  schedule:
    - cron: '40 4 * * *'  # 04:40 UTC daily — staggered across ecosystem (Brainarr+10m)
  push:
    branches: [main]
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - 'plugin.json'
      - 'packaging/**'
      - 'ext/Lidarr.Plugin.Common/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - 'plugin.json'
      - 'packaging/**'
      - 'ext/Lidarr.Plugin.Common/**'
  workflow_dispatch:

concurrency:
  group: packaging-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packaging-gates:
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/packaging-gates.yml@c2aca69b8c94bbba2ff9a4884291f0cc501eb623
    with:
      common-path: ext/Lidarr.Plugin.Common
      plugin-csproj: Qobuzarr.csproj
      manifest-path: plugin.json
      host-assemblies-path: ext/Lidarr/_output/net8.0
      lidarr-docker-version: pr-plugins-3.1.2.4913
      parity-lint: true
