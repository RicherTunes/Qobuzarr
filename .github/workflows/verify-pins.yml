name: Verify Pins
on:
  push:
    branches: [main]
    paths: ['.github/workflows/**', 'ext-common-sha.txt']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-pins:
    # TODO: update SHA once PR #514 merges to Common main
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/verify-common-pins.yml@c2aca69b8c94bbba2ff9a4884291f0cc501eb623
    with:
      has_private_submodules: false
    secrets:
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
