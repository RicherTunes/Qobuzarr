name: UI Screenshots

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 0'  # Weekly on Sunday
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'scripts/snapshots/**'
      - '.github/workflows/screenshots.yml'

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  LIDARR_DOCKER_VERSION: 'pr-plugins-2.14.2.4786'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Extract Lidarr Assemblies from Docker
        run: |
          docker pull ghcr.io/hotio/lidarr:${{ env.LIDARR_DOCKER_VERSION }}
          docker create --name lidarr-extract ghcr.io/hotio/lidarr:${{ env.LIDARR_DOCKER_VERSION }}
          # Lidarr 3.x plugins branch runs .NET 8.0 runtime
          mkdir -p ext/Lidarr/_output/net8.0
          docker cp lidarr-extract:/app/bin/. ext/Lidarr/_output/net8.0/
          docker rm lidarr-extract
          ls -la ext/Lidarr/_output/net8.0/ | head -20

      - name: Build Plugin
        run: |
          # Lidarr 3.x plugins branch requires .NET 8.0
          dotnet restore Qobuzarr.csproj \
            -p:TargetFramework=net8.0 \
            -p:LidarrAssembliesPath=ext/Lidarr/_output/net8.0
          dotnet build Qobuzarr.csproj \
            --configuration Release \
            --no-restore \
            -p:TargetFramework=net8.0 \
            -p:LidarrAssembliesPath=ext/Lidarr/_output/net8.0 \
            -p:UsePluginsBranch=true \
            -p:PluginPackagingDisable=false \
            -p:RunAnalyzersDuringBuild=false \
            -p:EnableNETAnalyzers=false \
            -p:TreatWarningsAsErrors=false

      - name: Stage Plugin Files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p plugin-dist

          # Find the built DLL and its directory
          DLL_PATH=$(find . -name 'Lidarr.Plugin.Qobuzarr.dll' -path '*/bin/*' | head -1)
          if [ -z "$DLL_PATH" ]; then
            echo "Could not find built Qobuzarr DLL" >&2
            find . -name '*.dll' -path '*/bin/*' | head -10
            exit 1
          fi

          BIN_DIR=$(dirname "$DLL_PATH")
          echo "Found plugin in: $BIN_DIR"

          # Copy plugin DLL and ALL dependencies
          # Only exclude Lidarr framework DLLs and NzbDrone DLLs (already in container)
          for dll in "$BIN_DIR"/*.dll; do
            filename=$(basename "$dll")
            # Skip Lidarr framework DLLs and NzbDrone DLLs (provided by container)
            if [[ "$filename" == Lidarr.*.dll && "$filename" != Lidarr.Plugin.* ]]; then
              echo "Skipping framework DLL: $filename"
              continue
            fi
            if [[ "$filename" == NzbDrone.*.dll ]]; then
              echo "Skipping framework DLL: $filename"
              continue
            fi
            echo "Copying: $filename"
            cp "$dll" plugin-dist/
          done

          cp plugin.json plugin-dist/ 2>/dev/null || echo "No plugin.json in root"
          echo "=== Staged plugin files ==="
          ls -la plugin-dist

      - name: Start Lidarr with plugin mounted
        run: |
          # NOTE: Lidarr plugins branch expects flat structure: /config/plugins/PluginName/
          # NOT nested: /config/plugins/Owner/PluginName/
          docker run -d --name lidarr-ss \
            -p 8686:8686 \
            -v "${{ github.workspace }}/plugin-dist:/config/plugins/RicherTunes/Qobuzarr:ro" \
            -e PUID=1000 -e PGID=1000 \
            ghcr.io/hotio/lidarr:${{ env.LIDARR_DOCKER_VERSION }}
          # Wait for config.xml to be created
          echo "Waiting for Lidarr to initialize..."
          CONFIG_FOUND=false
          for i in {1..60}; do
            if docker exec lidarr-ss test -f /config/config.xml 2>/dev/null; then
              echo "Config file exists!"
              CONFIG_FOUND=true
              break
            fi
            sleep 2
          done

          # Check if config.xml was found, fail gracefully with logs if not
          if [ "$CONFIG_FOUND" != "true" ]; then
            echo "ERROR: config.xml was not created after 120 seconds"
            echo "=== Container status ==="
            docker ps -a --filter name=lidarr-ss
            echo "=== Container logs ==="
            docker logs lidarr-ss 2>&1 || true
            exit 1
          fi

          # Configure authentication to bypass the modal (set to Forms with known creds)
          echo "Configuring authentication..."
          docker exec lidarr-ss sed -i 's|<AuthenticationMethod>.*</AuthenticationMethod>|<AuthenticationMethod>Forms</AuthenticationMethod>|' /config/config.xml
          docker exec lidarr-ss sed -i 's|<AuthenticationRequired>.*</AuthenticationRequired>|<AuthenticationRequired>DisabledForLocalAddresses</AuthenticationRequired>|' /config/config.xml

          # Restart Lidarr to apply config changes
          docker restart lidarr-ss

          # Wait for web to be ready
          echo "Waiting for Lidarr web interface..."
          for i in {1..60}; do
            if curl -fsS http://localhost:8686 >/dev/null 2>&1; then
              echo "Lidarr is ready!"
              break
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "Progress check $i/60 - container running:"
              docker ps --filter name=lidarr-ss --format "{{.Status}}"
            fi
            sleep 3
          done
          # Show final container logs for debugging
          echo "=== Lidarr container logs (last 50 lines) ==="
          docker logs lidarr-ss --tail 50 2>&1 || true

      - name: Verify plugin discovery via API
        shell: bash
        continue-on-error: true  # Allow failure on push events - screenshots are best-effort
        run: |
          set -e
          # Check if config.xml exists
          if ! docker exec lidarr-ss test -f /config/config.xml 2>/dev/null; then
            echo "WARNING: config.xml not found - Lidarr may have failed to start"
            echo "=== Container logs ==="
            docker logs lidarr-ss 2>&1 || true
            exit 1
          fi
          APIKEY=$(docker exec lidarr-ss sh -lc "sed -n 's:.*<ApiKey>\\(.*\\)</ApiKey>.*:\\1:p' /config/config.xml")
          echo "Using API key: ${APIKEY:0:4}..."
          # Check both indexer and download client schemas for complete plugin detection
          for i in $(seq 1 30); do
            INDEXER_RESPONSE=$(curl -fsS -H "X-Api-Key: $APIKEY" http://localhost:8686/api/v1/indexer/schema 2>/dev/null || echo "")
            DOWNLOAD_RESPONSE=$(curl -fsS -H "X-Api-Key: $APIKEY" http://localhost:8686/api/v1/downloadclient/schema 2>/dev/null || echo "")
            if echo "$INDEXER_RESPONSE" | grep -qi "Qobuzarr" && echo "$DOWNLOAD_RESPONSE" | grep -qi "Qobuzarr"; then
              echo "Qobuzarr plugin detected (both indexer and download client)"
              exit 0
            elif echo "$INDEXER_RESPONSE" | grep -qi "Qobuzarr"; then
              echo "Qobuzarr indexer detected, waiting for download client..."
            fi
            sleep 2
          done
          echo "Qobuzarr plugin not fully detected from Lidarr API after waiting" >&2
          echo "Indexer schema response (first 500 chars): ${INDEXER_RESPONSE:0:500}"
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm i -D playwright@1.48.2
          npx --yes playwright install --with-deps chromium

      - name: Fetch centralized screenshot utility
        run: |
          # Get the latest centralized screenshot utility from Common library
          mkdir -p .screenshot-tools
          curl -fsSL https://raw.githubusercontent.com/RicherTunes/Lidarr.Plugin.Common/main/scripts/snapshots/snap.mjs -o .screenshot-tools/snap.mjs
          echo "Downloaded centralized screenshot utility"

      - name: Capture Screenshots
        env:
          LIDARR_BASE_URL: http://localhost:8686
        run: |
          # Use centralized utility with Qobuzarr-specific settings
          # Captures: indexer add modal, indexer config, download-client add modal, download-client config
          node .screenshot-tools/snap.mjs \
            --plugin=Qobuzarr \
            --type=indexer,download-client \
            --output=docs/assets/screenshots \
            --url=http://localhost:8686

      - name: Upload Screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/assets/screenshots/*.png
          if-no-files-found: warn

      - name: Commit updated screenshots
        continue-on-error: true  # Push may fail due to branch protection - screenshots still uploaded as artifact
        run: |
          set -e
          if git status --porcelain | grep -E "^ M|^\?\?" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/assets/screenshots/*.png || true
            if git diff --cached --quiet; then
              echo "No screenshot changes to commit"
            else
              git commit -m "docs(screenshots): refresh auto-generated UI screenshots"
              git push || echo "Push failed (likely branch protection) - screenshots available as workflow artifact"
            fi
          else
            echo "No changes detected"
          fi

      - name: Cleanup container
        if: always()
        run: docker rm -f lidarr-ss || true
