name: Security Audit

on:
  schedule:
    # Run security checks weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'Directory.Packages.props'
      - '**/*.csproj'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_VERSION: 8.0.x

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Comprehensive security scan
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

    - name: Restore for dependency analysis
      run: |
        dotnet restore Qobuzarr.csproj

    - name: Vulnerability scan
      run: |
        echo "🔍 Scanning for package vulnerabilities (Qobuzarr.csproj)..."
        dotnet list Qobuzarr.csproj package --vulnerable --include-transitive || true
        
        # Exit with error if vulnerabilities found (for critical/high severity)
        if dotnet list Qobuzarr.csproj package --vulnerable --include-transitive | grep -E "(Critical|High)"; then
          echo "❌ Critical or High severity vulnerabilities found!"
          exit 1
        fi

    - name: Dependency analysis
      run: |
        echo "📋 Package analysis:"
        echo "## Package Vulnerabilities" >> $GITHUB_STEP_SUMMARY
        
        # Check for outdated packages
        dotnet list package --outdated || echo "All packages up to date"
        
        # Generate package report
        echo "### Package Status" >> $GITHUB_STEP_SUMMARY
        dotnet list package >> $GITHUB_STEP_SUMMARY || echo "Package listing failed" >> $GITHUB_STEP_SUMMARY

    - name: Code quality scan
      run: |
        echo "🔍 Scanning for security anti-patterns..."
        
        # Check for common security issues
        ISSUES=0
        
        # Hardcoded secrets
        if grep -r "password\s*=\s*\"[^\"]*\"" src/ --include="*.cs" | grep -v "// " | grep -v "null"; then
          echo "⚠️ Potential hardcoded passwords found"
          ISSUES=$((ISSUES+1))
        fi
        
        # API keys
        if grep -r "api[_-]?key\s*=\s*\"[^\"]*\"" src/ --include="*.cs" | grep -v "// "; then
          echo "⚠️ Potential hardcoded API keys found"
          ISSUES=$((ISSUES+1))
        fi
        
        # SQL injection patterns
        if grep -r "new SqlCommand.*+.*)" src/ --include="*.cs"; then
          echo "⚠️ Potential SQL injection vulnerability"
          ISSUES=$((ISSUES+1))
        fi
        
        # Unsafe deserialization
        if grep -r "JsonConvert\.DeserializeObject" src/ --include="*.cs"; then
          echo "ℹ️ JSON deserialization found - verify input validation"
        fi
        
        if [ $ISSUES -gt 0 ]; then
          echo "❌ $ISSUES security issues found"
          exit 1
        else
          echo "✅ No security issues detected"
        fi

    - name: Security summary
      run: |
        echo "## 🔒 Security Audit Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "- Secret scan: ✅ Completed" >> $GITHUB_STEP_SUMMARY
        echo "- Dependency vulnerabilities: ✅ Scanned" >> $GITHUB_STEP_SUMMARY  
        echo "- Code quality: ✅ Analyzed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Audit completed on: $(date)" >> $GITHUB_STEP_SUMMARY
