name: CLI Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_VERSION: 8.0.x

jobs:
  build-cli:
    name: Build CLI (strict)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build plugin (ensures shared code compiles)
      run: |
        dotnet restore Qobuzarr.csproj
        dotnet build Qobuzarr.csproj -c Release --no-restore -p:TreatWarningsAsErrors=false

    - name: Build CLI
      run: |
        dotnet restore QobuzCLI/QobuzCLI.csproj
        dotnet build QobuzCLI/QobuzCLI.csproj -c Release --no-restore -p:TreatWarningsAsErrors=false

