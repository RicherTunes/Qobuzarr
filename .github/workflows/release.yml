name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'
    
    - name: Setup Lidarr dependencies
      run: |
        cd ext
        git clone https://github.com/Lidarr/Lidarr.git Lidarr-source
        echo "Lidarr source downloaded to ext/Lidarr-source/"
    
    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "tag_name=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
    
    - name: Update assembly versions
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        # Remove 'v' prefix if present
        VERSION_NUMBER=${VERSION#v}
        
        echo "Updating assembly versions to $VERSION_NUMBER"
        
        # Update AssemblyInfo.cs
        sed -i "s/AssemblyVersion(\"[^\"]*\")/AssemblyVersion(\"$VERSION_NUMBER.0\")/g" src/Properties/AssemblyInfo.cs
        sed -i "s/AssemblyFileVersion(\"[^\"]*\")/AssemblyFileVersion(\"$VERSION_NUMBER.0\")/g" src/Properties/AssemblyInfo.cs
        sed -i "s/AssemblyInformationalVersion(\"[^\"]*\")/AssemblyInformationalVersion(\"$VERSION_NUMBER\")/g" src/Properties/AssemblyInfo.cs
        
        # Update project file
        sed -i "s/<AssemblyVersion>[^<]*<\/AssemblyVersion>/<AssemblyVersion>$VERSION_NUMBER.0<\/AssemblyVersion>/g" Qobuzarr.csproj
        sed -i "s/<FileVersion>[^<]*<\/FileVersion>/<FileVersion>$VERSION_NUMBER.0<\/FileVersion>/g" Qobuzarr.csproj
        sed -i "s/<AssemblyInformationalVersion>[^<]*<\/AssemblyInformationalVersion>/<AssemblyInformationalVersion>$VERSION_NUMBER<\/AssemblyInformationalVersion>/g" Qobuzarr.csproj
        
        # Verify changes
        echo "=== Updated AssemblyInfo.cs ==="
        grep -E "Assembly(Version|FileVersion|InformationalVersion)" src/Properties/AssemblyInfo.cs
        echo "=== Updated Qobuzarr.csproj ==="
        grep -E "<(Assembly|File)Version|<AssemblyInformationalVersion" Qobuzarr.csproj
    
    - name: Restore dependencies
      run: dotnet restore Qobuzarr.csproj
    
    - name: Build plugin
      run: dotnet build Qobuzarr.csproj --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test tests/Qobuzarr.Tests/Qobuzarr.Tests.csproj --configuration Release --no-build
    
    - name: Publish plugin
      run: dotnet publish Qobuzarr.csproj --configuration Release --no-build --output ./release-output
    
    - name: Prepare release files
      run: |
        mkdir -p ./release-package
        cp ./release-output/Qobuzarr.dll ./release-package/
        cp ./release-output/Qobuzarr.deps.json ./release-package/
        cp ./plugin.json ./release-package/
        cp ./README.md ./release-package/
        cp ./LICENSE ./release-package/
        cp ./CHANGELOG.md ./release-package/
    
    - name: Create release archive
      run: |
        cd ./release-package
        zip -r ../Qobuzarr-${{ steps.version.outputs.version }}.zip .
        cd ..
    
    - name: Generate release notes
      id: release_notes
      run: |
        echo "release_notes<<EOF" >> $GITHUB_OUTPUT
        echo "## Qobuzarr ${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 🚀 Features" >> $GITHUB_OUTPUT
        echo "- High-quality music indexer and download client for Qobuz" >> $GITHUB_OUTPUT
        echo "- ML.NET-powered query intelligence with 65.8% API call reduction" >> $GITHUB_OUTPUT
        echo "- Enterprise-grade reliability patterns and thread-safe operations" >> $GITHUB_OUTPUT
        echo "- Built upon TrevTV's Lidarr.Plugin.Qobuz foundation with significant enhancements" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 📦 Installation" >> $GITHUB_OUTPUT
        echo "1. Download \`Qobuzarr.dll\` from the assets below" >> $GITHUB_OUTPUT
        echo "2. Copy to your Lidarr plugins directory" >> $GITHUB_OUTPUT
        echo "3. Restart Lidarr" >> $GITHUB_OUTPUT
        echo "4. Configure Qobuz credentials in Settings → Indexers" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 📋 Requirements" >> $GITHUB_OUTPUT
        echo "- Lidarr v2.0+ (.NET 6.0 compatible)" >> $GITHUB_OUTPUT
        echo "- Active Qobuz subscription (Studio or Sublime+)" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### 🙏 Credits" >> $GITHUB_OUTPUT
        echo "Built upon the excellent foundational work of [TrevTV's Lidarr.Plugin.Qobuz](https://github.com/TrevTV/Lidarr.Plugin.Qobuz)" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: Qobuzarr ${{ steps.version.outputs.version }}
        body: ${{ steps.release_notes.outputs.release_notes }}
        files: |
          Qobuzarr-${{ steps.version.outputs.version }}.zip
          ./release-package/Qobuzarr.dll
          ./release-package/Qobuzarr.deps.json
          ./release-package/plugin.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}