name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

jobs:
  release:
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/release-plugin.yml@main
    # TODO: replace @main with merge-commit SHA after PR #514 merges
    with:
      plugin_name: Lidarr.Plugin.Qobuzarr
      plugin_dll: Lidarr.Plugin.Qobuzarr.dll
      main_csproj: Qobuzarr.csproj
      lidarr_path_msbuild_prop: LidarrPath
      dll_search_dirs: 'bin'
      minimum_lidarr_version: '2.13.2.4685'
      include_cosign: true
      include_sbom: true
      version: ${{ inputs.version || '' }}
      draft: ${{ inputs.draft || false }}
    secrets:
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
