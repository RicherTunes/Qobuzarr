name: Release (manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.0.15)"
        required: true
        default: "0.0.15"
      draft:
        description: "Create as draft"
        type: boolean
        required: true
        default: true
      prerelease:
        description: "Mark as prerelease"
        type: boolean
        required: true
        default: false

jobs:
  create-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            6.0.x

      - name: Ensure version matches
        shell: pwsh
        run: |
          $v = Get-Content VERSION -TotalCount 1
          if ($v.Trim() -ne '${{ inputs.version }}') {
            Write-Error "VERSION file ($v) does not match input (${{ inputs.version }})"; exit 1 }

      - name: Build (Release)
        run: |
          dotnet restore Qobuzarr.sln
          dotnet build Qobuzarr.sln -c Release -v minimal

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item plugin.json dist\
          Copy-Item bin\Lidarr.Plugin.Qobuzarr.dll dist\
          Compress-Archive -Path dist\* -DestinationPath qobuzarr-${{ inputs.version }}.zip -Force

      - name: Create tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          git fetch --prune --unshallow || git fetch --all
          git checkout origin/main
          $tag = 'v' + '${{ inputs.version }}'
          if (git rev-parse $tag 2>$null) { Write-Host "Tag $tag already exists" } else {
            git tag $tag
            git push origin $tag
          }

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG=v${{ inputs.version }}
          TITLE=Qobuzarr ${{ inputs.version }}
          DRAFT_FLAG=$([ [string]::IsNullOrEmpty('${{ inputs.draft }}') -or '${{ inputs.draft }}' -eq 'true' ] && echo "--draft" || echo "")
          PRERELEASE_FLAG=$([ '${{ inputs.prerelease }}' -eq 'true' ] && echo "--prerelease" || echo "")
          NOTES_FILE=.github/release-notes/${{ inputs.version }}.md
          if [ ! -f "$NOTES_FILE" ]; then NOTES_FILE=CHANGELOG.md; fi
          gh release create "$TAG" $DRAFT_FLAG $PRERELEASE_FLAG --title "$TITLE" --notes-file "$NOTES_FILE" || gh release edit "$TAG" $DRAFT_FLAG $PRERELEASE_FLAG --title "$TITLE" --notes-file "$NOTES_FILE"

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v${{ inputs.version }} qobuzarr-${{ inputs.version }}.zip dist/Lidarr.Plugin.Qobuzarr.dll dist/plugin.json --clobber

