name: Build Plugin (Main CI)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PLUGIN_NAME: Lidarr.Plugin.Qobuzarr
  MINIMUM_LIDARR_VERSION: 2.13.2.4685
  DOTNET_VERSION: 8.0.x

jobs:
  build:
    strategy:
      matrix:
        framework: [ net6.0 ]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Security Scan (git-leaks)
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Generate global.json
      run: echo '{"sdk":{"version":"${{ env.DOTNET_VERSION }}"}}' > global.json

    - name: Setup Lidarr Dependencies (Pre-built Assemblies)
      shell: bash
      run: |
        echo "📦 Setting up Lidarr dependencies using pre-built assemblies..."
        
        # Check if source-built assemblies exist first (highest priority)
        if [ -d "ext/Lidarr-source/_output/net6.0/win-x64" ] && [ $(ls -1 ext/Lidarr-source/_output/net6.0/win-x64/*.dll 2>/dev/null | wc -l) -gt 0 ]; then
          echo "✅ Using source-built Lidarr assemblies (most complete)"
          
          # Ensure output directory exists
          mkdir -p ext/Lidarr/_output/net6.0
          
          # Copy source-built assemblies to expected location
          cp -f ext/Lidarr-source/_output/net6.0/win-x64/*.dll ext/Lidarr/_output/net6.0/ || true
          
        elif [ -d "ext/Lidarr/_output/net6.0" ] && [ $(ls -1 ext/Lidarr/_output/net6.0/*.dll 2>/dev/null | wc -l) -gt 0 ]; then
          echo "✅ Using existing Lidarr assemblies from repository"
          
        else
          # Fallback: Create directory structure and download
          mkdir -p ext/Lidarr/_output/net6.0
          
          # Use the proven pre-built assembly approach
          chmod +x ./download-lidarr-assemblies.sh
          ./download-lidarr-assemblies.sh --version 2.13.2.4685
        fi
        
        echo "✅ Lidarr pre-built assemblies ready"
        
        # Verify assemblies were downloaded
        echo "📋 Verifying available assemblies:"
        ls -la ext/Lidarr/_output/net6.0/ || echo "⚠️ Assembly directory not found"

    - name: Set Version from Single Source of Truth
      run: |
        # Read version from VERSION file (single source of truth)
        if [ -f "VERSION" ]; then
          BASE_VERSION=$(cat VERSION | tr -d '\n\r')
          echo "📁 Version from file: $BASE_VERSION"
        else
          BASE_VERSION="0.1.0"
          echo "⚠️ No VERSION file found, using default: $BASE_VERSION"
        fi
        
        # Determine final version based on trigger type
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          # Tagged release: use tag version but validate against VERSION file
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"  # Remove 'v' prefix if present
          VERSION="$TAG_VERSION"
          echo "🏷️ Release build from tag: $VERSION"
          
          # Validate tag matches VERSION file for consistency
          if [[ "$BASE_VERSION" != "$TAG_VERSION" ]]; then
            echo "⚠️ Warning: VERSION file ($BASE_VERSION) differs from tag ($TAG_VERSION)"
            echo "Using tag version for release"
          fi
        else
          # Development build: add dev suffix with run number
          VERSION="${BASE_VERSION%%-*}.${{ github.run_number }}-dev"
          echo "🔨 Development build: $VERSION"
        fi
        
        echo "PLUGIN_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Final version: $VERSION"
        
        # Proven technique for Lidarr compatibility
        sed -i'' -e "s/<AssemblyVersion>[0-9.*]\+<\/AssemblyVersion>/<AssemblyVersion>${{ env.MINIMUM_LIDARR_VERSION }}<\/AssemblyVersion>/g" ext/Lidarr-source/src/Directory.Build.props || echo "No Directory.Build.props found (expected for pre-built approach)"

    - name: Restore
      run: |
        echo "🔄 Restoring main plugin..."
        dotnet restore Qobuzarr.csproj

    - name: Build
      run: |
        echo "🔨 Building main plugin with version $PLUGIN_VERSION..."
        dotnet build Qobuzarr.csproj --configuration Release --no-restore \
          -p:Version="$PLUGIN_VERSION" \
          -p:RunAnalyzersDuringBuild=false \
          -p:EnableNETAnalyzers=false \
          -p:TreatWarningsAsErrors=false
        
        echo "✅ Main plugin built successfully"
        
        echo "🔨 Building CLI project..."
        dotnet restore QobuzCLI/QobuzCLI.csproj
        dotnet build QobuzCLI/QobuzCLI.csproj --configuration Release --no-restore \
          -p:RunAnalyzersDuringBuild=false \
          -p:EnableNETAnalyzers=false \
          -p:TreatWarningsAsErrors=false
        
        echo "✅ CLI built successfully"
        
        echo "🔍 Running security audit..."
        dotnet list package --vulnerable --include-transitive || echo "No vulnerabilities found"
        
        echo "✅ Build completed with version $PLUGIN_VERSION"

    - name: Run Tests
      run: pwsh -File ./tests/run-tests.ps1

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PLUGIN_NAME }}-${{ matrix.framework }}
        path: |
          bin/**
          !bin/**/ref/**
          !bin/**/runtimes/linux-*/**
          !bin/**/runtimes/osx-*/**
          !bin/**/runtimes/win-*/**

    - name: Generate Changelog
      run: |
        # Generate simple changelog
        echo "## Changes in this build" > changelog.md
        git log --oneline -10 >> changelog.md

    - name: Package Plugin
      run: |
        echo "📦 Packaging plugin version $PLUGIN_VERSION..."
        cd bin
        zip -r "../Qobuzarr-v$PLUGIN_VERSION.zip" *
        cd ..
        echo "✅ Plugin packaged as Qobuzarr-v$PLUGIN_VERSION.zip"
        ls -la Qobuzarr-v*.zip

    - name: Create Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        name: ${{ env.PLUGIN_NAME }} v${{ env.PLUGIN_VERSION }}
        body_path: changelog.md
        files: Qobuzarr-v${{ env.PLUGIN_VERSION }}.zip
        draft: false
        prerelease: false