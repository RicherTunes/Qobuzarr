name: Build Plugin

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PLUGIN_NAME: Lidarr.Plugin.Qobuzarr
  MINIMUM_LIDARR_VERSION: 2.13.2.4686
  DOTNET_VERSION: 6.0.x

jobs:
  build:
    strategy:
      matrix:
        framework: [ net6.0 ]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Generate global.json
      run: echo '{"sdk":{"version":"${{ env.DOTNET_VERSION }}"}}' > global.json

    - name: Setup Lidarr Plugin Branch (same as local)
      shell: bash
      run: |
        echo "📦 Setting up Lidarr from plugin branch to match local development..."
        
        # Clone the same Lidarr source we use locally
        if [ ! -d "ext/Lidarr-source" ]; then
          git clone https://github.com/Lidarr/Lidarr.git ext/Lidarr-source
        fi
        
        cd ext/Lidarr-source
        git fetch origin
        git checkout 6e8228f2f  # Use exact same commit as local development
        
        echo "📍 Using Lidarr commit: $(git rev-parse HEAD)"
        
        # Build the assemblies we need with analyzer suppression
        dotnet build src/NzbDrone.Common/Lidarr.Common.csproj -c Release -o ../_output/net6.0/ \
          -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false -p:TreatWarningsAsErrors=false
        dotnet build src/NzbDrone.Core/Lidarr.Core.csproj -c Release -o ../_output/net6.0/ \
          -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false -p:TreatWarningsAsErrors=false
        
        cd ../..
        echo "✅ Lidarr plugin branch assemblies ready"

    - name: Set Version from Single Source of Truth
      run: |
        # Read version from VERSION file (single source of truth)
        if [ -f "VERSION" ]; then
          BASE_VERSION=$(cat VERSION | tr -d '\n\r')
          echo "📁 Version from file: $BASE_VERSION"
        else
          BASE_VERSION="0.1.0"
          echo "⚠️ No VERSION file found, using default: $BASE_VERSION"
        fi
        
        # Determine final version based on trigger type
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          # Tagged release: use tag version but validate against VERSION file
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"  # Remove 'v' prefix if present
          VERSION="$TAG_VERSION"
          echo "🏷️ Release build from tag: $VERSION"
          
          # Validate tag matches VERSION file for consistency
          if [[ "$BASE_VERSION" != "$TAG_VERSION" ]]; then
            echo "⚠️ Warning: VERSION file ($BASE_VERSION) differs from tag ($TAG_VERSION)"
            echo "Using tag version for release"
          fi
        else
          # Development build: add dev suffix with run number
          VERSION="${BASE_VERSION%%-*}.${{ github.run_number }}-dev"
          echo "🔨 Development build: $VERSION"
        fi
        
        echo "PLUGIN_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Final version: $VERSION"
        
        # TrevTV's proven technique for Lidarr compatibility
        sed -i'' -e "s/<AssemblyVersion>[0-9.*]\+<\/AssemblyVersion>/<AssemblyVersion>${{ env.MINIMUM_LIDARR_VERSION }}<\/AssemblyVersion>/g" ext/Lidarr-source/src/Directory.Build.props || echo "No Directory.Build.props found (expected for pre-built approach)"

    - name: Restore
      run: |
        echo "🔄 Restoring main plugin..."
        dotnet restore Qobuzarr.csproj
        
        echo "🔄 Restoring CLI..."
        dotnet restore QobuzCLI/QobuzCLI.csproj

    - name: Build
      run: |
        echo "🔨 Building main plugin with version $PLUGIN_VERSION..."
        dotnet build Qobuzarr.csproj --configuration Release --no-restore \
          -p:Version="$PLUGIN_VERSION" \
          -p:RunAnalyzersDuringBuild=false \
          -p:EnableNETAnalyzers=false \
          -p:TreatWarningsAsErrors=false
        
        echo "🔨 Building CLI..."
        dotnet build QobuzCLI/QobuzCLI.csproj --configuration Release --no-restore \
          -p:RunAnalyzersDuringBuild=false \
          -p:EnableNETAnalyzers=false \
          -p:TreatWarningsAsErrors=false
        
        echo "✅ Build completed with version $PLUGIN_VERSION"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PLUGIN_NAME }}-${{ matrix.framework }}
        path: |
          bin/**
          !bin/**/ref/**
          !bin/**/runtimes/linux-*/**
          !bin/**/runtimes/osx-*/**
          !bin/**/runtimes/win-*/**

    - name: Generate Changelog
      run: |
        # Generate simple changelog
        echo "## Changes in this build" > changelog.md
        git log --oneline -10 >> changelog.md

    - name: Package Plugin
      run: |
        echo "📦 Packaging plugin version $PLUGIN_VERSION..."
        cd bin
        zip -r "../Qobuzarr-v$PLUGIN_VERSION.zip" *
        cd ..
        echo "✅ Plugin packaged as Qobuzarr-v$PLUGIN_VERSION.zip"
        ls -la Qobuzarr-v*.zip

    - name: Create Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        name: ${{ env.PLUGIN_NAME }} v${{ env.PLUGIN_VERSION }}
        body_path: changelog.md
        files: Qobuzarr-v${{ env.PLUGIN_VERSION }}.zip
        draft: false
        prerelease: false