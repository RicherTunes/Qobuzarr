name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Validate project structure
        shell: bash
        run: |
          set -euo pipefail
          echo "Validating project structure..."
          for file in Qobuzarr.csproj plugin.json Directory.Packages.props; do
            [ -f "$file" ] || { echo "[ERROR] Missing $file"; exit 1; }
          done
          for dir in src src/API src/Authentication src/Download src/Indexers; do
            [ -d "$dir" ] || { echo "[ERROR] Missing dir $dir/"; exit 1; }
          done

      - name: Validate plugin manifest
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json,sys
          with open('plugin.json','r',encoding='utf-8') as f:
              data=json.load(f)
          v=data.get('version')
          assert isinstance(v,str) and len(v)>0, 'version missing'
          print('Plugin version:', v)
          PY

      - name: Quick dotnet restore (sanity)
        run: dotnet restore Qobuzarr.csproj
