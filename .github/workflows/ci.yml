name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PLUGIN_NAME: Lidarr.Plugin.Qobuzarr
  MINIMUM_LIDARR_VERSION: 2.13.2.4685
  DOTNET_VERSION: 8.0.x

jobs:
  # ============================================================================
  # VALIDATION JOB - Fast validation and security checks
  # ============================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # Avoid failing validation when private submodules are unavailable
        submodules: false

    - name: Security Scan (git-leaks)
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

    - name: Validate project structure
      run: |
        echo "Validating project structure..."
        
        # Check required files
        for file in Qobuzarr.csproj plugin.json Directory.Packages.props CLAUDE.md; do
          if [ -f "$file" ]; then
            echo "[OK] $file exists"
          else
            echo "[ERROR] $file missing"
            exit 1
          fi
        done
        
        # Check required directories
        for dir in src src/API src/Authentication src/Download src/Indexers; do
          if [ -d "$dir" ]; then
            echo "[OK] $dir/ exists"
          else
            echo "[ERROR] $dir/ missing"
            exit 1
          fi
        done

    - name: Validate critical implementations
      run: |
        echo "[CHECK] Checking critical implementations..."
        
        # Check memory leak fix
        if grep -q "IDisposable" src/Download/Clients/QobuzDownloadItem.cs; then
          echo "[OK] QobuzDownloadItem implements IDisposable"
        else
          echo "[ERROR] QobuzDownloadItem missing IDisposable"
          exit 1
        fi
        
        # Check Protocol implementation (support both legacy enum and plugin string)
        if grep -q "DownloadProtocol.Unknown" src/Indexers/QobuzIndexer.cs || grep -q "public override string Protocol" src/Indexers/QobuzIndexer.cs; then
          echo "[OK] QobuzIndexer has Protocol implementation"
        else
          echo "[ERROR] QobuzIndexer missing Protocol implementation"
          exit 1
        fi

    - name: Validate plugin manifest
      run: |
        echo "🔍 Validating plugin.json..."
        python3 -m json.tool plugin.json > /dev/null
        echo "[OK] plugin.json is valid JSON"
        
        VERSION=$(cat plugin.json | python3 -c "import sys, json; print(json.load(sys.stdin)['version'])")
        echo "📦 Plugin version: $VERSION"

    - name: Security checks
      run: |
        echo "🔒 Running security checks..."
        
        # Check for hardcoded credentials
        if grep -r "password\s*=\s*\"" src/ --include="*.cs" | grep -v "// " | grep -v "password\": null"; then
          echo "[WARN] Warning: Possible hardcoded passwords found"
        else
          echo "[OK] No hardcoded passwords detected"
        fi
        
        if grep -r "api[_-]?key\s*=\s*\"" src/ --include="*.cs" | grep -v "// "; then
          echo "[WARN] Warning: Possible hardcoded API keys found" 
        else
          echo "[OK] No hardcoded API keys detected"
        fi

  # ============================================================================
  # BUILD AND TEST JOB - Full compilation and testing
  # ============================================================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        framework: [ net6.0 ]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Try initialize submodules (if token provided)
      if: ${{ secrets.SUBMODULES_TOKEN != '' }}
      env:
        GH_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
      run: |
        echo "Initializing submodules with token..."
        git config --global url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
        git submodule sync --recursive || true
        git submodule update --init --force --recursive || true
        echo "Submodule status:" && git submodule status || true

    - name: Check submodule presence
      id: submods
      run: |
        if [ -d "ext/Lidarr.Plugin.Common" ]; then
          echo "present=true" >> $GITHUB_OUTPUT
        else
          echo "present=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup .NET
      if: steps.submods.outputs.present == 'true'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Create global.json
      run: |
        echo '{"sdk":{"version":"${{ env.DOTNET_VERSION }}"}}' > global.json

    - name: Setup Lidarr assemblies
      run: |
        echo "📦 Setting up Lidarr assemblies..."
        mkdir -p ext/Lidarr/_output/net6.0
        
        # Use proven pre-built assembly approach
        chmod +x ./download-lidarr-assemblies.sh
        ./download-lidarr-assemblies.sh --version ${{ env.MINIMUM_LIDARR_VERSION }}
        
        echo "[OK] Lidarr assemblies ready"
        ls -la ext/Lidarr/_output/net6.0/ || echo "[WARN] Assembly directory not found"

    - name: Set version
      run: |
        # Read version from VERSION file (single source of truth)
        if [ -f "VERSION" ]; then
          BASE_VERSION=$(cat VERSION | tr -d '\n\r')
        else
          BASE_VERSION="0.1.0"
        fi
        
        # Development build: add dev suffix with run number
        VERSION="${BASE_VERSION%%-*}.${{ github.run_number }}-dev"
        echo "PLUGIN_VERSION=$VERSION" >> $GITHUB_ENV
        echo "📦 Plugin version: $VERSION"

    - name: Restore dependencies
      if: steps.submods.outputs.present == 'true'
      run: |
        echo "🔄 Restoring dependencies..."
        dotnet restore Qobuzarr.csproj

    - name: Build plugin
      if: steps.submods.outputs.present == 'true'
      run: |
        echo "🔨 Building plugin with version $PLUGIN_VERSION..."
        dotnet build Qobuzarr.csproj --configuration Release --no-restore \
          -p:Version="$PLUGIN_VERSION" \
          -p:RunAnalyzersDuringBuild=false \
          -p:EnableNETAnalyzers=false \
          -p:TreatWarningsAsErrors=false
        
        echo "[OK] Plugin built successfully"

    - name: Build CLI (if present)
      run: |
        if [ -d "QobuzCLI" ]; then
          echo "🔨 Building CLI project..."
          dotnet restore QobuzCLI/QobuzCLI.csproj
          dotnet build QobuzCLI/QobuzCLI.csproj --configuration Release --no-restore \
            -p:RunAnalyzersDuringBuild=false \
            -p:EnableNETAnalyzers=false \
            -p:TreatWarningsAsErrors=false
          echo "[OK] CLI built successfully"
        else
          echo "[INFO] No CLI project found"
        fi

    - name: Run tests
      if: steps.submods.outputs.present == 'true'
      run: |
        if [ -d "tests" ]; then
          echo "[TEST] Running tests..."
          # Use direct dotnet commands to get detailed error output
          echo "[DEBUG] First, try to build the test project directly..."
          dotnet build tests/Qobuzarr.Tests/Qobuzarr.Tests.csproj --configuration Release --verbosity detailed || echo "[WARN] Main test project build failed"
          
          echo "[DEBUG] Try building other test projects..."
          find tests -name "*.csproj" -exec echo "Building: {}" \; -exec dotnet build {} --configuration Release --verbosity normal \;
          
          echo "[DEBUG] Now try running tests..."
          if [ -f "tests/run-tests.ps1" ]; then
            pwsh -File ./tests/run-tests.ps1
          else
            # Fallback: run any test projects found
            find tests -name "*.csproj" -exec dotnet test {} --configuration Release --logger "console;verbosity=normal" \;
          fi
        else
          echo "[INFO] No tests directory found"
        fi

    - name: Verify plugin output
      if: steps.submods.outputs.present == 'true'
      run: |
        echo "🔍 Checking plugin output..."
        ls -la bin/
        
        if [ -f "bin/Lidarr.Plugin.Qobuzarr.dll" ]; then
          echo "[OK] Plugin DLL created successfully"
          echo "📦 Size: $(stat -c%s bin/Lidarr.Plugin.Qobuzarr.dll) bytes"
        else
          echo "[ERROR] Plugin DLL not found!"
          exit 1
        fi

    - name: Security audit
      if: steps.submods.outputs.present == 'true'
      run: |
        echo "🔍 Running security audit..."
        dotnet list package --vulnerable --include-transitive || echo "No vulnerabilities found"

    - name: Package plugin
      if: steps.submods.outputs.present == 'true'
      run: |
        echo "📦 Creating plugin package..."
        cd bin
        zip -r "../${{ env.PLUGIN_NAME }}-v$PLUGIN_VERSION.zip" *
        cd ..
        echo "[OK] Plugin packaged successfully"
        ls -la *.zip

    - name: Upload build artifacts
      if: steps.submods.outputs.present == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PLUGIN_NAME }}-${{ matrix.framework }}
        path: |
          bin/**
          *.zip
          !bin/**/ref/**
          !bin/**/runtimes/linux-*/**
          !bin/**/runtimes/osx-*/**
        retention-days: 30

    - name: Build summary
      run: |
        echo "## 🎯 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Information" >> $GITHUB_STEP_SUMMARY
        echo "- Plugin Version: $PLUGIN_VERSION" >> $GITHUB_STEP_SUMMARY
        echo "- .NET Version: ${{ env.DOTNET_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- Target Framework: ${{ matrix.framework }}" >> $GITHUB_STEP_SUMMARY
        echo "- Lidarr Version: ${{ env.MINIMUM_LIDARR_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.submods.outputs.present }}" = "true" ] && [ -f "bin/Lidarr.Plugin.Qobuzarr.dll" ]; then
          echo "### [OK] Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Plugin DLL: $(stat -c%s bin/Lidarr.Plugin.Qobuzarr.dll) bytes" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ℹ️ Build Skipped" >> $GITHUB_STEP_SUMMARY
          echo "- Private submodule ext/Lidarr.Plugin.Common not available; build/test steps skipped." >> $GITHUB_STEP_SUMMARY
        fi

  # ============================================================================
  # RELEASE JOB - Only on main branch success
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.PLUGIN_NAME }}-net6.0

    - name: Generate changelog
      run: |
        echo "## Changes in this build" > changelog.md
        echo "" >> changelog.md
        echo "This is an automated development build." >> changelog.md
        echo "" >> changelog.md
        echo "### Recent Commits" >> changelog.md
        git log --oneline -10 >> changelog.md || echo "- Latest changes from main branch" >> changelog.md

    - name: Create development release
      uses: softprops/action-gh-release@v1
      with:
        name: Development Build
        tag_name: dev-${{ github.run_number }}
        body_path: changelog.md
        files: "*.zip"
        draft: false
        prerelease: true
