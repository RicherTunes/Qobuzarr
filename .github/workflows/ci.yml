name: Build Plugin

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PLUGIN_NAME: Lidarr.Plugin.Qobuzarr
  PLUGIN_VERSION: 0.0.${{ github.run_number }}
  MINIMUM_LIDARR_VERSION: 2.13.2.4686
  DOTNET_VERSION: 6.0.x

jobs:
  build:
    strategy:
      matrix:
        framework: [ net6.0 ]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Generate global.json
      run: echo '{"sdk":{"version":"${{ env.DOTNET_VERSION }}"}}' > global.json

    - name: Download Lidarr assemblies (same as local build.ps1)
      shell: bash
      run: |
        echo "📦 Setting up Lidarr assemblies to match local development..."
        
        # Use the same approach as local build.ps1
        if [ -f "./download-lidarr-assemblies.sh" ]; then
          chmod +x ./download-lidarr-assemblies.sh
          ./download-lidarr-assemblies.sh --version 2.13.2.4685 --force
          echo "✅ Used download script like local development"
        else
          echo "⚠️ Using manual download as fallback"
          mkdir -p ext/Lidarr/_output/net6.0
        fi
        
        echo "📍 Available assemblies:"
        ls -la ext/Lidarr/_output/net6.0/ || echo "No assemblies found"

    - name: Update Version Info
      run: |
        # TrevTV's proven technique - the key to making plugins work!
        # Use same path as build.ps1: ext/Lidarr-source/src/Directory.Build.props
        sed -i'' -e "s/<AssemblyVersion>[0-9.*]\+<\/AssemblyVersion>/<AssemblyVersion>${{ env.MINIMUM_LIDARR_VERSION }}<\/AssemblyVersion>/g" ext/Lidarr-source/src/Directory.Build.props || echo "No Directory.Build.props found (expected for pre-built approach)"
        sed -i'' -e "s/<Version>.*<\/Version>/<Version>${{ env.PLUGIN_VERSION }}<\/Version>/g" Qobuzarr.csproj || echo "Version update failed"
        echo "Plugin version set to ${{ env.PLUGIN_VERSION }}"

    - name: Restore
      run: dotnet restore

    - name: Build
      run: |
        dotnet build --configuration Release --no-restore \
          -p:RunAnalyzersDuringBuild=false \
          -p:EnableNETAnalyzers=false \
          -p:TreatWarningsAsErrors=false

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PLUGIN_NAME }}-${{ matrix.framework }}
        path: |
          bin/**
          !bin/**/ref/**
          !bin/**/runtimes/linux-*/**
          !bin/**/runtimes/osx-*/**
          !bin/**/runtimes/win-*/**

    - name: Generate Changelog
      run: |
        # Generate simple changelog
        echo "## Changes in this build" > changelog.md
        git log --oneline -10 >> changelog.md

    - name: Package Plugin
      run: |
        cd bin
        zip -r ../Plugin.zip *
        cd ..
        echo "Plugin packaged as Plugin.zip"
        ls -la Plugin.zip

    - name: Create Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        name: ${{ env.PLUGIN_NAME }} v${{ env.PLUGIN_VERSION }}
        body_path: changelog.md
        files: Plugin.zip
        draft: true