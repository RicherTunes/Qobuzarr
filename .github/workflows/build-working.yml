name: Build Plugin (Working Method)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PLUGIN_NAME: Lidarr.Plugin.Qobuzarr
  PLUGIN_VERSION: 0.1.${{ github.run_number }}
  MINIMUM_LIDARR_VERSION: 2.13.2.4685
  DOTNET_VERSION: 8.0.404

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # Add NuGet package caching
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Create global.json
      run: |
        echo '{"sdk":{"version": "${{ env.DOTNET_VERSION }}"}}' > ./global.json

    - name: Setup Lidarr assemblies (pre-built approach)
      run: |
        echo "📦 Setting up pre-built Lidarr assemblies..."
        
        # Create output directory structure that matches project expectations
        mkdir -p ext/Lidarr/_output/net6.0
        
        # Use the proven pre-built assembly download approach
        chmod +x ./download-lidarr-assemblies.sh
        ./download-lidarr-assemblies.sh --version ${{ env.MINIMUM_LIDARR_VERSION }}
        
        echo "✅ Lidarr assemblies ready"
        
        # Verify assemblies were downloaded
        echo "📋 Available assemblies:"
        ls -la ext/Lidarr/_output/net6.0/ || echo "⚠️ Assembly directory not found"

    - name: Update Version Info
      run: |
        # Update our plugin version (pre-built assemblies don't need Lidarr source version override)
        sed -i'' -e "s/<AssemblyVersion>[0-9.*]\+<\/AssemblyVersion>/<AssemblyVersion>$PLUGIN_VERSION<\/AssemblyVersion>/g" Directory.Build.props || echo "No plugin Directory.Build.props found"
        
        echo "Plugin version updated to $PLUGIN_VERSION"

    - name: Restore dependencies
      run: |
        echo "Restoring with minimal NuGet sources..."
        dotnet restore Qobuzarr.csproj

    - name: Build Plugin
      run: |
        echo "Building plugin..."
        # Restore first
        dotnet restore Qobuzarr.csproj
        
        # Then build with version metadata
        dotnet build Qobuzarr.csproj \
          --configuration Release \
          --no-restore \
          -p:Version=${{ env.PLUGIN_VERSION }} \
          -p:AssemblyVersion=${{ env.PLUGIN_VERSION }} \
          -p:FileVersion=${{ env.PLUGIN_VERSION }} \
          -p:RunAnalyzersDuringBuild=false \
          -p:EnableNETAnalyzers=false \
          -p:TreatWarningsAsErrors=false \
          -p:CI="true" \
          -v:normal

    - name: Verify plugin files
      run: |
        echo "Checking plugin output..."
        ls -la bin/
        
        if [ -f "bin/Lidarr.Plugin.Qobuzarr.dll" ]; then
          echo "✅ Plugin DLL created successfully"
          echo "Size: $(stat -c%s bin/Lidarr.Plugin.Qobuzarr.dll) bytes"
        else
          echo "❌ Plugin DLL not found!"
          exit 1
        fi
        
        if [ -f "bin/plugin.json" ]; then
          echo "✅ Plugin manifest found"
          cat bin/plugin.json
        else
          echo "❌ Plugin manifest not found!"
          exit 1
        fi

    - name: Upload plugin artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ${{ env.PLUGIN_NAME }}
        path: |
          bin/Lidarr.Plugin.Qobuzarr.dll
          bin/plugin.json
          bin/*.pdb
        retention-days: 30

    - name: Create release package
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Creating release package..."
        mkdir -p release-package
        cp bin/Lidarr.Plugin.Qobuzarr.dll release-package/
        cp bin/plugin.json release-package/
        
        # Create ZIP package
        cd release-package
        zip -r ../Qobuzarr-${{ env.PLUGIN_VERSION }}.zip .
        cd ..
        
        echo "Package created: Qobuzarr-${{ env.PLUGIN_VERSION }}.zip"

    - name: Upload release package
      uses: actions/upload-artifact@v4
      if: github.ref == 'refs/heads/main'
      with:
        name: qobuzarr-release-${{ env.PLUGIN_VERSION }}
        path: Qobuzarr-${{ env.PLUGIN_VERSION }}.zip
        retention-days: 90