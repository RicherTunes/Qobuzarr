name: Docker E2E

# Wave 24 — adopts the shared docker-e2e composite action from
# ext/Lidarr.Plugin.Common/.github/actions/docker-e2e (added in wave 23 by
# tidalarr). Boots a real Lidarr container with the merged Qobuzarr DLL
# mounted and runs the wave-21/22 smoke matrix (indexer/downloadclient
# schema visibility + /api/v1/.../test sensible-failure assertions).
#
# Linux only: the Lidarr image is a Linux container, so this workflow must
# run on ubuntu-latest.
#
# ILRepack handling (qobuzarr-specific):
#   * The plugin csproj produces a merged ILRepack DLL into bin/ — this is
#     the artefact that gets bind-mounted into the Lidarr container by the
#     fixture, so it must be a real merged build.
#   * The test csproj must build with -p:PluginPackagingDisable=true so the
#     test assemblies in bin-tests/ resolve against unmerged refs (xUnit
#     can't load against ILRepacked output).
#   * Order matters: build plugin first (merged), then tests (unmerged).
#   * The composite action runs `dotnet test --no-build`, so both flavours
#     must be built up-front in this workflow.
#
# verify-local.ps1 -SkipTests handles the plugin build (calls into Common's
# local-ci.ps1 which restores the host assemblies and produces the merged
# DLL). We then add an explicit test-project build step with the
# PluginPackagingDisable flag.

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/e2e.ps1'
      - 'scripts/verify-local.ps1'
      - 'ext/**'
      - 'ext-common-sha.txt'
      - '.github/workflows/docker-e2e.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/e2e.ps1'
      - 'scripts/verify-local.ps1'
      - 'ext/**'
      - 'ext-common-sha.txt'
      - '.github/workflows/docker-e2e.yml'
  workflow_dispatch:
    inputs:
      lidarr-docker-version:
        description: 'Lidarr Docker tag (plugins branch, net8)'
        required: false
        default: 'pr-plugins-3.1.2.4913'

permissions:
  contents: read

concurrency:
  group: docker-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Docker E2E (Qobuzarr)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init Common submodule
        shell: bash
        run: |
          git config --local url.https://github.com/.insteadOf git@github.com:
          git submodule sync -- ext/Lidarr.Plugin.Common
          git submodule update --init --depth=1 -- ext/Lidarr.Plugin.Common

      - name: Assert composite action present
        shell: bash
        run: |
          path="ext/Lidarr.Plugin.Common/.github/actions/docker-e2e/action.yml"
          if [ ! -f "$path" ]; then
            echo "::error::Composite action not found at $path."
            echo "::error::Bump ext-common-sha.txt to a wave-23+ commit of Lidarr.Plugin.Common."
            exit 1
          fi
          echo "Composite action present: $path"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build plugin (merged ILRepack DLL via verify-local)
        shell: pwsh
        run: pwsh scripts/verify-local.ps1 -SkipTests

      - name: Build tests (unmerged, PluginPackagingDisable=true)
        shell: bash
        run: |
          dotnet build tests/Qobuzarr.Tests/Qobuzarr.Tests.csproj \
            --configuration Release \
            -p:PluginPackagingDisable=true

      - name: Docker E2E
        uses: ./ext/Lidarr.Plugin.Common/.github/actions/docker-e2e
        with:
          plugin-name: qobuzarr
          test-project: tests/Qobuzarr.Tests/Qobuzarr.Tests.csproj
          lidarr-docker-version: ${{ inputs.lidarr-docker-version || 'pr-plugins-3.1.2.4913' }}
          configuration: Release
