name: Notify on Failure

# Thin caller of Common's reusable notify-failure workflow (brainarr parity).
# Keeps qobuzarr's own workflow_run trigger + monitored-workflow list (plugin-specific)
# and delegates the Discord/Slack/summary notification to the shared reusable so the
# message format and webhook handling (secret + vars fallback) are single-sourced.

on:
  workflow_run:
    workflows:
      - "CI"
      - "Nightly"
      - "CodeQL Security Analysis"
      - "Packaging Gates"
      - "Docker E2E"
      - "Test and Coverage"
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  notify:
    # Only delegate when the monitored workflow actually failed.
    if: github.event.workflow_run.conclusion == 'failure'
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/notify-failure.yml@workflows/v1 # identical to main for notify-failure (verified 2026-06-09)
    with:
      workflow_name: ${{ github.event.workflow_run.name }}
      run_url: ${{ github.event.workflow_run.html_url }}
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
