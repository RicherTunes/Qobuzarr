name: CI (Simple)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 6
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'
    
    - name: Note about build limitations
      run: |
        echo "Note: This CI cannot build the full plugin due to dependency on private Lidarr NuGet feeds."
        echo "The plugin requires local development environment with proper Lidarr source setup."
        echo "Checking basic project structure instead..."
    
    - name: Validate project structure
      run: |
        echo "Validating project files exist..."
        test -f Qobuzarr.csproj && echo "✓ Main project file exists"
        test -f Directory.Packages.props && echo "✓ Package management file exists"
        test -d src && echo "✓ Source directory exists"
        test -f plugin.json && echo "✓ Plugin manifest exists"
        echo "Project structure validated!"
    
    - name: Status
      run: |
        echo "✅ Basic validation completed!"
        echo "Note: Full build requires local development setup with Lidarr source."