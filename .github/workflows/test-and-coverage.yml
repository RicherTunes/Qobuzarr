name: Test and Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    name: Test with Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Configure git auth for private submodules
        env:
          CI_PAT: ${{ secrets.CI_PAT }}
        run: |
          if [ -n "$CI_PAT" ]; then
            git config --global url.https://x-access-token:${CI_PAT}@github.com/.insteadOf https://github.com/
            git submodule sync --recursive
            git submodule update --init --recursive
            echo "Submodules initialized with CI_PAT"
          else
            echo "CI_PAT not available - attempting with default token"
            git submodule update --init --recursive || echo "Submodule init failed - continuing without submodules"
          fi

      - name: Assert Common submodule initialized
        shell: bash
        run: |
          if [ ! -d "ext/Lidarr.Plugin.Common/scripts" ]; then
            echo "::error::FATAL: ext/Lidarr.Plugin.Common/scripts not found - submodule not initialized"
            exit 1
          fi
          SHA=$(git -C ext/Lidarr.Plugin.Common rev-parse --short HEAD 2>/dev/null || echo "<unknown>")
          echo "✓ Common submodule initialized at $SHA"
          if [ -f ext-common-sha.txt ]; then
            EXPECTED=$(cat ext-common-sha.txt | tr -d '[:space:]' | cut -c1-7)
            if [ -n "$EXPECTED" ] && [ "$SHA" != "<unknown>" ] && [ "${SHA:0:7}" != "$EXPECTED" ]; then
              echo "::warning::Submodule SHA ($SHA) differs from pinned ($EXPECTED)"
            fi
          fi

      - name: Install PowerShell (pwsh)
        shell: bash
        run: |
          set -euo pipefail
          . /etc/os-release
          CODENAME=${VERSION_CODENAME:-"jammy"}
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/$CODENAME/packages-microsoft-prod.deb" -o packages-microsoft-prod.deb \
            || curl -fsSL "https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb" -o packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup Lidarr assemblies (plugins branch Docker)
        run: |
          set -euo pipefail
          mkdir -p ext/Lidarr/_output/net8.0
          IMAGE="ghcr.io/hotio/lidarr:pr-plugins-3.1.2.4913"
          echo "Pulling $IMAGE..."
          docker pull "$IMAGE" || { echo "Docker pull failed"; exit 1; }
          cid=$(docker create "$IMAGE")
          docker cp "$cid:/app" ext/Lidarr/_extracted || docker cp "$cid:/opt/lidarr" ext/Lidarr/_extracted
          docker rm "$cid" >/dev/null
          find ext/Lidarr/_extracted -type f -name "*.dll" -exec cp {} ext/Lidarr/_output/net8.0 \;
          echo "Extracted $(ls ext/Lidarr/_output/net8.0/*.dll 2>/dev/null | wc -l) assemblies"

      - name: Restore and build
        run: |
          dotnet restore Qobuzarr.csproj
          dotnet build Qobuzarr.csproj --configuration Release --no-restore \
            -p:UsePluginsBranch=true -p:PluginPackagingDisable=true \
            -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false

      - name: Build tests
        run: |
          if [ -d "tests/Minimal.Tests" ]; then
            dotnet build tests/Minimal.Tests/Minimal.Tests.csproj --configuration Release \
              -p:UsePluginsBranch=true -p:PluginPackagingDisable=true \
              -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false
          fi

      - name: Run tests with coverage (unified runner)
        shell: pwsh
        run: |
          $runner = Join-Path $PWD 'ext/Lidarr.Plugin.Common/scripts/test.ps1'
          if (-not (Test-Path $runner)) {
            Write-Error "Unified test runner not found at: $runner"
            exit 1
          }
          # Unified runner defaults exclude: Integration, Packaging,
          # LibraryLinking, Benchmark, Slow, Quarantined.
          # AdditionalFilter adds Qobuzarr-specific exclusions.
          & $runner `
            -TestProject 'tests/Minimal.Tests/Minimal.Tests.csproj' `
            -Configuration Release `
            -Coverage `
            -CI `
            -NoBuild `
            -OutputDir 'test-results/coverage' `
            -AdditionalFilter 'Category!=LiveIntegration&Category!=Performance' `
            -Properties @('UsePluginsBranch=true', 'PluginPackagingDisable=true')

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage summary
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          COV=$(find test-results -name "coverage.cobertura.xml" -type f | head -1)
          if [ -n "$COV" ] && [ -f "$COV" ]; then
            reportgenerator \
              -reports:"$COV" \
              -targetdir:"coverage-report" \
              -reporttypes:"MarkdownSummary;HtmlInline_AzurePipelines"
            echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
            cat coverage-report/Summary.md >> $GITHUB_STEP_SUMMARY || true
          else
            echo "No coverage file found"
          fi

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage
          path: |
            test-results/coverage/
            tests/TestResults/
            coverage-report/
          retention-days: 14

  e2e-gate:
    name: E2E Gate (Hermetic)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Configure git auth for private submodules
        env:
          CI_PAT: ${{ secrets.CI_PAT }}
        run: |
          if [ -n "$CI_PAT" ]; then
            git config --global url.https://x-access-token:${CI_PAT}@github.com/.insteadOf https://github.com/
            git submodule sync --recursive
            git submodule update --init --recursive
          else
            git submodule update --init --recursive || echo "Submodule init failed - continuing without submodules"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Lidarr assemblies (plugins branch Docker)
        run: |
          set -euo pipefail
          mkdir -p ext/Lidarr/_output/net8.0
          IMAGE="ghcr.io/hotio/lidarr:pr-plugins-3.1.2.4913"
          docker pull "$IMAGE" || { echo "Docker pull failed"; exit 1; }
          cid=$(docker create "$IMAGE")
          docker cp "$cid:/app" ext/Lidarr/_extracted || docker cp "$cid:/opt/lidarr" ext/Lidarr/_extracted
          docker rm "$cid" >/dev/null
          find ext/Lidarr/_extracted -type f -name "*.dll" -exec cp {} ext/Lidarr/_output/net8.0 \;
          echo "Extracted $(ls ext/Lidarr/_output/net8.0/*.dll 2>/dev/null | wc -l) assemblies"

      - name: Restore and build
        run: |
          dotnet restore Qobuzarr.csproj
          dotnet build Qobuzarr.csproj --configuration Release --no-restore \
            -p:UsePluginsBranch=true -p:PluginPackagingDisable=true \
            -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false

      - name: Build and run E2E hermetic gate tests
        run: |
          TEST_PROJ="tests/Qobuzarr.Tests/Qobuzarr.Tests.csproj"
          if [ ! -f "$TEST_PROJ" ]; then
            TEST_PROJ=$(find tests -name "*.Tests.csproj" -type f | head -1)
          fi
          if [ -n "$TEST_PROJ" ] && [ -f "$TEST_PROJ" ]; then
            dotnet test "$TEST_PROJ" \
              --configuration Release \
              --verbosity normal \
              --filter "Area=E2E/Hermetic" \
              -p:UsePluginsBranch=true -p:PluginPackagingDisable=true \
              -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false
          else
            echo "::warning::No test project found for E2E gate"
          fi
