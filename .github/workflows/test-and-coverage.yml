name: Test and Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Single source of truth for CI test filtering
  # Excludes: LiveIntegration (needs live Lidarr), Integration (needs assemblies),
  #           Performance (benchmarks), Quarantined (known issues)
  CI_TEST_FILTER: "Category!=LiveIntegration&Category!=Integration&Category!=Performance&Category!=Quarantined"

jobs:
  test:
    name: Test with Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Configure git auth for private submodules
        env:
          CI_PAT: ${{ secrets.CI_PAT }}
        run: |
          if [ -n "$CI_PAT" ]; then
            git config --global url.https://x-access-token:${CI_PAT}@github.com/.insteadOf https://github.com/
            git submodule sync --recursive
            git submodule update --init --recursive
            echo "Submodules initialized with CI_PAT"
          else
            echo "CI_PAT not available - attempting with default token"
            git submodule update --init --recursive || echo "Submodule init failed - continuing without submodules"
          fi

      - name: Assert Common submodule initialized
        shell: bash
        run: |
          if [ ! -d "ext/Lidarr.Plugin.Common/scripts" ]; then
            echo "::error::FATAL: ext/Lidarr.Plugin.Common/scripts not found - submodule not initialized"
            exit 1
          fi
          SHA=$(git -C ext/Lidarr.Plugin.Common rev-parse --short HEAD 2>/dev/null || echo "<unknown>")
          echo "✓ Common submodule initialized at $SHA"
          if [ -f ext-common-sha.txt ]; then
            EXPECTED=$(cat ext-common-sha.txt | tr -d '[:space:]' | cut -c1-7)
            if [ -n "$EXPECTED" ] && [ "$SHA" != "<unknown>" ] && [ "${SHA:0:7}" != "$EXPECTED" ]; then
              echo "::warning::Submodule SHA ($SHA) differs from pinned ($EXPECTED)"
            fi
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup Lidarr assemblies (plugins branch Docker)
        run: |
          set -euo pipefail
          mkdir -p ext/Lidarr/_output/net8.0
          IMAGE="ghcr.io/hotio/lidarr:pr-plugins"
          echo "Pulling $IMAGE..."
          docker pull "$IMAGE" || { echo "Docker pull failed"; exit 1; }
          cid=$(docker create "$IMAGE")
          docker cp "$cid:/app" ext/Lidarr/_extracted || docker cp "$cid:/opt/lidarr" ext/Lidarr/_extracted
          docker rm "$cid" >/dev/null
          find ext/Lidarr/_extracted -type f -name "*.dll" -exec cp {} ext/Lidarr/_output/net8.0 \;
          echo "Extracted $(ls ext/Lidarr/_output/net8.0/*.dll 2>/dev/null | wc -l) assemblies"

      - name: Restore and build
        run: |
          dotnet restore Qobuzarr.csproj
          dotnet build Qobuzarr.csproj --configuration Release --no-restore \
            -p:UsePluginsBranch=true -p:PluginPackagingDisable=true \
            -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false

      - name: Build tests
        run: |
          if [ -d "tests/Minimal.Tests" ]; then
            dotnet build tests/Minimal.Tests/Minimal.Tests.csproj --configuration Release \
              -p:UsePluginsBranch=true -p:PluginPackagingDisable=true \
              -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false
          fi

      - name: Run tests with coverage
        run: |
          mkdir -p test-results/coverage
          if [ -f "tests/Minimal.Tests/Minimal.Tests.csproj" ]; then
            dotnet test tests/Minimal.Tests/Minimal.Tests.csproj \
              --no-build \
              --configuration Release \
              --settings tests/Default.runsettings \
              --collect "XPlat Code Coverage" \
              --filter "${{ env.CI_TEST_FILTER }}" \
              --logger "trx;LogFileName=coverage-tests.trx" \
              --results-directory ./test-results/coverage \
              --blame-hang-timeout 60s
          elif [ -f "tests/run-tests.ps1" ]; then
            pwsh -File ./tests/run-tests.ps1 -Configuration Release
          else
            dotnet test \
              --no-build \
              --configuration Release \
              --settings tests/Default.runsettings \
              --collect "XPlat Code Coverage" \
              --filter "${{ env.CI_TEST_FILTER }}" \
              --logger "trx;LogFileName=coverage-tests.trx" \
              --results-directory ./test-results/coverage \
              --blame-hang-timeout 60s
          fi

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage summary
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          COV=$(find test-results -name "coverage.cobertura.xml" -type f | head -1)
          if [ -n "$COV" ] && [ -f "$COV" ]; then
            reportgenerator \
              -reports:"$COV" \
              -targetdir:"coverage-report" \
              -reporttypes:"MarkdownSummary;HtmlInline_AzurePipelines"
            echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
            cat coverage-report/Summary.md >> $GITHUB_STEP_SUMMARY || true
          else
            echo "No coverage file found"
          fi

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage
          path: |
            test-results/coverage/
            tests/TestResults/
            coverage-report/
          retention-days: 14

  e2e-gate:
    name: E2E Gate (Hermetic)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Configure git auth for private submodules
        env:
          CI_PAT: ${{ secrets.CI_PAT }}
        run: |
          if [ -n "$CI_PAT" ]; then
            git config --global url.https://x-access-token:${CI_PAT}@github.com/.insteadOf https://github.com/
            git submodule sync --recursive
            git submodule update --init --recursive
          else
            git submodule update --init --recursive || echo "Submodule init failed - continuing without submodules"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Lidarr assemblies (plugins branch Docker)
        run: |
          set -euo pipefail
          mkdir -p ext/Lidarr/_output/net8.0
          IMAGE="ghcr.io/hotio/lidarr:pr-plugins"
          docker pull "$IMAGE" || { echo "Docker pull failed"; exit 1; }
          cid=$(docker create "$IMAGE")
          docker cp "$cid:/app" ext/Lidarr/_extracted || docker cp "$cid:/opt/lidarr" ext/Lidarr/_extracted
          docker rm "$cid" >/dev/null
          find ext/Lidarr/_extracted -type f -name "*.dll" -exec cp {} ext/Lidarr/_output/net8.0 \;
          echo "Extracted $(ls ext/Lidarr/_output/net8.0/*.dll 2>/dev/null | wc -l) assemblies"

      - name: Restore and build
        run: |
          dotnet restore Qobuzarr.csproj
          dotnet build Qobuzarr.csproj --configuration Release --no-restore \
            -p:UsePluginsBranch=true -p:PluginPackagingDisable=true \
            -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false

      - name: Build and run E2E hermetic gate tests
        run: |
          TEST_PROJ="tests/Qobuzarr.Tests/Qobuzarr.Tests.csproj"
          if [ ! -f "$TEST_PROJ" ]; then
            TEST_PROJ=$(find tests -name "*.Tests.csproj" -type f | head -1)
          fi
          if [ -n "$TEST_PROJ" ] && [ -f "$TEST_PROJ" ]; then
            dotnet test "$TEST_PROJ" \
              --configuration Release \
              --no-restore \
              --verbosity normal \
              --filter "Area=E2E/Hermetic" \
              -p:UsePluginsBranch=true -p:PluginPackagingDisable=true \
              -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false
          else
            echo "::warning::No test project found for E2E gate"
          fi
