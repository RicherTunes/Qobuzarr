name: Bump Common Submodule

on:
  workflow_dispatch: {}
  schedule:
    # Run daily at 2:20 AM UTC (after Common nightly, before our nightly)
    - cron: '20 2 * * *'

jobs:
  bump:
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/bump-common-plugin.yml@c2aca69b8c94bbba2ff9a4884291f0cc501eb623
    # TODO: replace @main with merge-commit SHA after PR #514 merges
    # Quality fixes absorbed from reusable workflow:
    #   - actions/setup-dotnet@v5 (was @v4 — stale)
    #   - actions/checkout@v6 (was @v4)
    #   - plugin_csproj: Qobuzarr.csproj (was wrong: "src/Qobuzarr/Qobuzarr.csproj")
    with:
      plugin_csproj: Qobuzarr.csproj
      solution_file: Qobuzarr.sln
      lidarr_path_msbuild_prop: LidarrPath
      include_build_verify: true
      extract_script_path: scripts/extract-lidarr-assemblies.sh
    secrets:
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
