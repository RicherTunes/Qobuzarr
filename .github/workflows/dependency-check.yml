name: Dependency Security Check

on:
  schedule:
    # Run dependency checks weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Run full dependency vulnerability scan'
        required: false
        default: 'true'
        type: boolean

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: |
        dotnet restore Qobuzarr.csproj
        dotnet restore QobuzCLI/QobuzCLI.csproj
        find tests/ -name "*.csproj" -exec dotnet restore {} \;

    - name: List all packages
      run: |
        echo "=== Main Plugin Dependencies ===" 
        dotnet list Qobuzarr.csproj package --include-transitive
        echo -e "\n=== CLI Dependencies ==="
        dotnet list QobuzCLI/QobuzCLI.csproj package --include-transitive
        echo -e "\n=== Test Dependencies ==="
        find tests/ -name "*.csproj" -exec echo "=== {} ===" \; -exec dotnet list {} package --include-transitive \;

    - name: Check for vulnerable packages
      run: |
        echo "=== Vulnerability Check: Main Plugin ===" 
        dotnet list Qobuzarr.csproj package --vulnerable --include-transitive > vulnerability-report-plugin.txt 2>&1
        echo -e "\n=== Vulnerability Check: CLI ==="
        dotnet list QobuzCLI/QobuzCLI.csproj package --vulnerable --include-transitive > vulnerability-report-cli.txt 2>&1
        echo -e "\n=== Vulnerability Check: Tests ==="
        find tests/ -name "*.csproj" -exec sh -c 'echo "=== Checking $1 ===" && dotnet list "$1" package --vulnerable --include-transitive' _ {} \; > vulnerability-report-tests.txt 2>&1

    - name: Analyze vulnerability results
      run: |
        echo "=== Vulnerability Analysis Results ==="
        VULNERABILITIES_FOUND=false
        
        for report in vulnerability-report-*.txt; do
          echo "--- Analyzing $report ---"
          if grep -q "has the following vulnerable packages" "$report"; then
            echo "::error::Vulnerabilities found in $report"
            cat "$report"
            VULNERABILITIES_FOUND=true
          else
            echo "No vulnerabilities found in $report"
          fi
          echo ""
        done
        
        if [ "$VULNERABILITIES_FOUND" = true ]; then
          echo "::error::One or more vulnerable packages detected. Please review and update dependencies."
          exit 1
        else
          echo "::notice::No vulnerable packages detected in any project."
        fi

    - name: Check for outdated packages
      run: |
        echo "=== Outdated Package Analysis ==="
        dotnet list Qobuzarr.csproj package --outdated > outdated-packages-plugin.txt 2>&1 || true
        dotnet list QobuzCLI/QobuzCLI.csproj package --outdated > outdated-packages-cli.txt 2>&1 || true
        find tests/ -name "*.csproj" -exec sh -c 'dotnet list "$1" package --outdated' _ {} \; > outdated-packages-tests.txt 2>&1 || true
        
        echo "--- Outdated packages summary ---"
        for report in outdated-packages-*.txt; do
          echo "=== $report ==="
          cat "$report" | grep -E "(Project|>)" || echo "No outdated packages or no output"
          echo ""
        done

    - name: Generate dependency report
      run: |
        echo "# Dependency Security Report - $(date)" > dependency-security-report.md
        echo "" >> dependency-security-report.md
        
        echo "## Vulnerability Scan Results" >> dependency-security-report.md
        echo "" >> dependency-security-report.md
        
        VULN_COUNT=0
        for report in vulnerability-report-*.txt; do
          PROJECT_NAME=$(echo "$report" | sed 's/vulnerability-report-//g' | sed 's/.txt//g')
          echo "### $PROJECT_NAME" >> dependency-security-report.md
          
          if grep -q "has the following vulnerable packages" "$report"; then
            echo "⚠️ **Vulnerabilities detected**" >> dependency-security-report.md
            echo '```' >> dependency-security-report.md
            cat "$report" >> dependency-security-report.md
            echo '```' >> dependency-security-report.md
            VULN_COUNT=$((VULN_COUNT + 1))
          else
            echo "✅ No vulnerabilities detected" >> dependency-security-report.md
          fi
          echo "" >> dependency-security-report.md
        done
        
        echo "## Outdated Packages" >> dependency-security-report.md
        echo "" >> dependency-security-report.md
        
        for report in outdated-packages-*.txt; do
          PROJECT_NAME=$(echo "$report" | sed 's/outdated-packages-//g' | sed 's/.txt//g')
          echo "### $PROJECT_NAME" >> dependency-security-report.md
          echo '```' >> dependency-security-report.md
          cat "$report" >> dependency-security-report.md
          echo '```' >> dependency-security-report.md
          echo "" >> dependency-security-report.md
        done
        
        echo "## Summary" >> dependency-security-report.md
        echo "" >> dependency-security-report.md
        echo "- **Total projects scanned**: $(ls vulnerability-report-*.txt | wc -l)" >> dependency-security-report.md
        echo "- **Projects with vulnerabilities**: $VULN_COUNT" >> dependency-security-report.md
        echo "- **Scan date**: $(date -u)" >> dependency-security-report.md

    - name: Upload dependency reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-security-reports-${{ github.sha }}
        path: |
          vulnerability-report-*.txt
          outdated-packages-*.txt
          dependency-security-report.md
        retention-days: 30

    - name: Create GitHub issue if vulnerabilities found
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let reportContent = '';
          
          try {
            reportContent = fs.readFileSync('dependency-security-report.md', 'utf8');
          } catch (error) {
            reportContent = 'Error reading dependency security report.';
          }
          
          const issue = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Security Vulnerabilities Detected in Dependencies',
            body: `## Automated Security Alert
          
          The scheduled dependency security scan has detected vulnerable packages in the project.
          
          **Action Required**: Please review and update the affected dependencies.
          
          ### Report Details
          
          ${reportContent}
          
          ---
          
          This issue was automatically created by the dependency-check workflow.
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
            labels: ['security', 'dependencies', 'automated']
          });
          
          console.log('Created security issue:', issue.data.number);

  license-compliance:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Install license detection tool
      run: dotnet tool install --global dotnet-project-licenses

    - name: Restore dependencies
      run: dotnet restore Qobuzarr.csproj

    - name: Generate license report
      run: |
        dotnet-project-licenses --input Qobuzarr.csproj --output-format json --output license-report.json
        dotnet-project-licenses --input Qobuzarr.csproj --output-format text --output license-report.txt

    - name: Check for problematic licenses
      run: |
        echo "=== License Compliance Check ==="
        
        # Define problematic licenses
        PROBLEMATIC_LICENSES="GPL-2.0|AGPL|SSPL|BUSL|Commons Clause"
        
        if grep -iE "$PROBLEMATIC_LICENSES" license-report.txt; then
          echo "::warning::Potentially problematic licenses detected. Please review license compatibility."
        else
          echo "::notice::No problematic licenses detected."
        fi
        
        echo ""
        echo "=== License Summary ==="
        cat license-report.txt

    - name: Upload license report
      uses: actions/upload-artifact@v4
      with:
        name: license-compliance-report-${{ github.sha }}
        path: |
          license-report.json
          license-report.txt
        retention-days: 90