name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '*.md'
      - '.markdownlint.yaml'
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
      - '.markdownlint.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install --global markdownlint-cli2

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" --config .markdownlint.yaml
        continue-on-error: true

  links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --retry-wait-time 2
            --max-retries 2
            docs/**/*.md README.md
        continue-on-error: true
