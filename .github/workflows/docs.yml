name: Deploy Documentation

on:
  push:
    branches: [ main ]
    paths: [ 'docs/**', 'README.md', 'CONTRIBUTING.md' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Pages
      id: pages-setup
      uses: actions/configure-pages@v4
      continue-on-error: true
      
    - name: Create Documentation Site
      run: |
        mkdir -p _site
        
        # Copy documentation structure
        cp -r docs/* _site/
        cp README.md _site/index.md
        cp CONTRIBUTING.md _site/
        
        # Create navigation structure
        cat > _site/_config.yml << 'EOF'
        title: Qobuzarr Documentation
        description: High-quality Lidarr plugin for Qobuz streaming service
        theme: jekyll-theme-cayman
        
        plugins:
          - jekyll-relative-links
          
        relative_links:
          enabled: true
          collections: true
        EOF
        
        # Create index page
        cat > _site/README.md << 'EOF'
        # Qobuzarr Documentation
        
        ## Quick Links
        
        ### Getting Started
        - [Installation Guide](user/GETTING_STARTED.md)
        - [Configuration Guide](user/CONFIGURATION-GUIDE.md)
        - [Quick Reference](user/QUICK-REFERENCE.md)
        
        ### Development
        - [Contributing Guide](CONTRIBUTING.md)
        - [Development Setup](development/DEVELOPMENT.md)
        - [Testing Guide](development/COMPREHENSIVE-TESTING-GUIDE.md)
        - [Architecture Overview](architecture/ARCHITECTURE.md)
        
        ### Operations
        - [Deployment Guide](operations/DEPLOYMENT-GUIDE.md)
        - [Monitoring Setup](operations/MONITORING-DASHBOARD-SETUP.md)
        - [Troubleshooting](user/TROUBLESHOOTING.md)
        
        ### Technical Excellence
        - [Service Migration Guide](architecture/SERVICE-MIGRATION-GUIDE.md)
        - [Performance Validation](SPRINT-3-PERFORMANCE-VALIDATION-COMPLETE.md)
        - [Technical Debt Resolution](TECHNICAL-DEBT-RESOLUTION-COMPLETE.md)
        
        ---
        
        **Status**: Production ready with enterprise-grade quality  
        **Grade**: A+ with validated performance claims  
        **Monitoring**: Real-time telemetry with automatic validation
        EOF
        
    - name: Upload artifact
      if: steps.pages-setup.outcome == 'success'
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'
        
    - name: Deploy to GitHub Pages
      if: steps.pages-setup.outcome == 'success'
      id: deployment
      uses: actions/deploy-pages@v4
      
    - name: Pages Not Enabled Notice
      if: steps.pages-setup.outcome == 'failure'
      run: |
        echo "📝 GitHub Pages is not enabled for this repository yet."
        echo "✅ Documentation site prepared successfully!"
        echo "🔧 To enable: Go to repository Settings → Pages → Source → GitHub Actions"
        echo "🌐 Once enabled, docs will be available at: https://richertunes.github.io/Qobuzarr/"
        
        # Create deployment summary even when Pages isn't enabled
        echo "## Documentation Deployment Status" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Documentation site built successfully" >> $GITHUB_STEP_SUMMARY  
        echo "- ⚠️ GitHub Pages not enabled (expected)" >> $GITHUB_STEP_SUMMARY
        echo "- 🔧 Enable in: Repository Settings → Pages → Source → GitHub Actions" >> $GITHUB_STEP_SUMMARY
        echo "- 🌐 Future URL: https://richertunes.github.io/Qobuzarr/" >> $GITHUB_STEP_SUMMARY