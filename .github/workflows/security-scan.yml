name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup Lidarr Plugin Branch (same as local)
      shell: bash
      run: |
        echo "📦 Setting up Lidarr from plugin branch for security analysis..."
        
        # Clone the same Lidarr source we use locally
        if [ ! -d "ext/Lidarr-source" ]; then
          git clone https://github.com/Lidarr/Lidarr.git ext/Lidarr-source
        fi
        
        cd ext/Lidarr-source
        git fetch origin
        git checkout 6e8228f2f  # Use exact same commit as local development
        
        # Build the assemblies we need with analyzer suppression
        dotnet build src/NzbDrone.Common/Lidarr.Common.csproj -c Release -o ../_output/net6.0/ \
          -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false -p:TreatWarningsAsErrors=false
        dotnet build src/NzbDrone.Core/Lidarr.Core.csproj -c Release -o ../_output/net6.0/ \
          -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false -p:TreatWarningsAsErrors=false
        
        cd ../..
        echo "✅ Lidarr plugin branch assemblies ready"

    - name: Restore dependencies
      run: |
        echo "📦 Restoring main plugin dependencies for security analysis..."
        dotnet restore Qobuzarr.csproj

    - name: Run .NET Security Analysis
      run: |
        echo "🔍 Checking for vulnerable packages..."
        dotnet list package --vulnerable --include-transitive 2>&1 | tee security-report.txt
        if grep -q "has the following vulnerable packages" security-report.txt; then
          echo "::warning::Vulnerable packages detected. Please review the security report."
          cat security-report.txt
        else
          echo "✅ No vulnerable packages detected."
        fi

    - name: Build validation (ensure no security issues prevent building)
      run: |
        echo "🔨 Building main plugin for security validation..."
        dotnet build Qobuzarr.csproj --configuration Release --no-restore \
          -p:RunAnalyzersDuringBuild=false \
          -p:EnableNETAnalyzers=false \
          -p:TreatWarningsAsErrors=false
        
        echo "✅ Security validation build completed - no build-blocking security issues"

    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-scan-results-${{ github.sha }}
        path: security-report.txt
        retention-days: 30

  secrets-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        extra_args: --debug --only-verified