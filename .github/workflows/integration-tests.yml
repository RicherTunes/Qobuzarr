name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      lidarr_version:
        description: 'Lidarr plugins branch version (e.g., pr-plugins-4)'
        required: true
        default: 'pr-plugins-2.14.2.4786'
        type: string
      force_extract:
        description: 'Force re-extraction even if cached'
        required: false
        default: false
        type: boolean
      run_host_version_check:
        description: 'Fail if host-coupled package pins drift from the extracted host assemblies'
        required: false
        default: true
        type: boolean
      run_docker_smoke_test:
        description: 'Run Docker smoke test (plugin loads + schema appears)'
        required: false
        default: true
        type: boolean

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  LIDARR_ASSEMBLIES_PATH: ext/lidarr-assemblies
  # Required DLLs for plugin compilation and testing
  REQUIRED_DLLS: |
    Lidarr.dll
    Lidarr.Core.dll
    Lidarr.Common.dll
    Lidarr.Http.dll

jobs:
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache Lidarr assemblies
        id: cache-lidarr
        uses: actions/cache@v4
        with:
          path: ${{ env.LIDARR_ASSEMBLIES_PATH }}
          key: ${{ runner.os }}-lidarr-assemblies-${{ inputs.lidarr_version }}
          restore-keys: |
            ${{ runner.os }}-lidarr-assemblies-
          
      - name: Extract Lidarr assemblies
        if: steps.cache-lidarr.outputs.cache-hit != 'true' || inputs.force_extract
        run: |
          set -euo pipefail
          
          echo "::group::Extract Lidarr assemblies from Docker"
          
          # Cleanup any leftover container from failed runs
          docker rm -f lidarr 2>/dev/null || true
          
          # Ensure container is removed even if extraction fails
          cleanup() { docker rm -f lidarr 2>/dev/null || true; }
          trap cleanup EXIT
          
          # Clear existing assemblies if force extracting
          if [ "${{ inputs.force_extract }}" = "true" ]; then
            rm -rf "${{ env.LIDARR_ASSEMBLIES_PATH }}"
          fi
          
          mkdir -p "${{ env.LIDARR_ASSEMBLIES_PATH }}"
          
          echo "Pulling ghcr.io/hotio/lidarr:${{ inputs.lidarr_version }}..."
          docker pull "ghcr.io/hotio/lidarr:${{ inputs.lidarr_version }}"
          
          echo "Creating container..."
          docker create --name lidarr "ghcr.io/hotio/lidarr:${{ inputs.lidarr_version }}"
          
          echo "Extracting assemblies..."
          docker cp lidarr:/app/bin/. "${{ env.LIDARR_ASSEMBLIES_PATH }}/"
          
          echo "::endgroup::"
          
      - name: Validate required assemblies
        run: |
          set -euo pipefail
          
          echo "::group::Validate required DLLs"
          
          MISSING=()
          for dll in ${{ env.REQUIRED_DLLS }}; do
            if [ -f "${{ env.LIDARR_ASSEMBLIES_PATH }}/$dll" ]; then
              SIZE=$(stat -c%s "${{ env.LIDARR_ASSEMBLIES_PATH }}/$dll" 2>/dev/null || stat -f%z "${{ env.LIDARR_ASSEMBLIES_PATH }}/$dll")
              echo "  [OK] $dll ($SIZE bytes)"
            else
              echo "  [MISSING] $dll"
              MISSING+=("$dll")
            fi
          done
          
          echo ""
          echo "Total assemblies: $(ls -1 ${{ env.LIDARR_ASSEMBLIES_PATH }}/*.dll 2>/dev/null | wc -l)"
          
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required assemblies: ${MISSING[*]}"
            echo ""
            echo "Available assemblies:"
            ls -la "${{ env.LIDARR_ASSEMBLIES_PATH }}/"
            exit 1
          fi
          
          echo "::endgroup::"
          echo "All required assemblies present."

      - name: Check host-coupled package pins
        if: inputs.run_host_version_check
        shell: pwsh
        run: |
          ./scripts/check-host-versions.ps1 -Strict -HostAssembliesDir "${{ env.LIDARR_ASSEMBLIES_PATH }}"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Docker Smoke Test (plugin load)
        if: inputs.run_docker_smoke_test
        shell: pwsh
        run: |
          ./scripts/docker-smoke-test.ps1 -LidarrTag "${{ inputs.lidarr_version }}"

      - name: Run Integration Tests
        run: |
          dotnet test tests/Qobuzarr.Tests/Qobuzarr.Tests.csproj \
            --no-build \
            -c Release \
            -p:LidarrAssembliesPath="${{ github.workspace }}/${{ env.LIDARR_ASSEMBLIES_PATH }}" \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./test-results
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./test-results/*.trx
