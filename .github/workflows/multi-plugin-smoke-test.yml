name: 🔥 Multi-Plugin Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      - 'src/Qobuzarr/**'
      - '.github/workflows/multi-plugin-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/Qobuzarr/**'
      - '.github/workflows/multi-plugin-smoke-test.yml'
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

permissions:
  contents: read

jobs:
  smoke-test:
    name: 🔥 Plugin Co-existence
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/multi-plugin-smoke-test.yml@feature/ilrepack-internalization
    with:
      caller_plugin: qobuzarr
      test_plugins: 'brainarr,qobuzarr,tidalarr'
      lidarr_docker_version: 'pr-plugins-2.14.2.4786'
    secrets:
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
