name: 🔥 Multi-Plugin Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      # Source code
      - 'src/**'
      - 'tests/**'
      # Build/packaging
      - 'build/**'
      - 'tools/**'
      - 'scripts/**'
      - '*.props'
      - '*.targets'
      - 'global.json'
      - 'NuGet.config'
      - 'plugin.json'
      - 'manifest.json'
      # Submodule/ext changes
      - 'ext/**'
      - 'ext-common-sha.txt'
      # This workflow
      - '.github/workflows/multi-plugin-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'build/**'
      - 'tools/**'
      - 'scripts/**'
      - '*.props'
      - '*.targets'
      - 'global.json'
      - 'NuGet.config'
      - 'plugin.json'
      - 'manifest.json'
      - 'ext/**'
      - 'ext-common-sha.txt'
      - '.github/workflows/multi-plugin-smoke-test.yml'
  workflow_dispatch:
  # NOTE: No schedule - Brainarr is the canonical weekly runner to avoid redundant artifact usage

permissions:
  contents: read
  actions: read

jobs:
  smoke-test:
    name: 🔥 Plugin Co-existence
    uses: RicherTunes/Lidarr.Plugin.Common/.github/workflows/multi-plugin-smoke-test.yml@main
    with:
      test_plugins: 'qobuzarr,tidalarr,brainarr,applemusicarr'
      caller_plugin: 'qobuzarr'
      lidarr_tag: 'pr-plugins-3.1.2.4913'
    secrets: inherit
