name: CodeQL Security Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 3 AM

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking - requires GitHub Advanced Security (Code Scanning)
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: ['csharp']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Init Common submodule only
        shell: bash
        run: |
          git submodule sync -- ext/Lidarr.Plugin.Common
          git submodule update --init --depth=1 -- ext/Lidarr.Plugin.Common

      - name: Assert Common submodule initialized
        shell: bash
        run: |
          if [ ! -d "ext/Lidarr.Plugin.Common/scripts" ]; then
            echo "::error::FATAL: ext/Lidarr.Plugin.Common/scripts not found - submodule not initialized"
            exit 1
          fi
          SHA=$(git -C ext/Lidarr.Plugin.Common rev-parse --short HEAD 2>/dev/null || echo "<unknown>")
          echo "✓ Common submodule initialized at $SHA"
          if [ -f ext-common-sha.txt ]; then
            EXPECTED=$(cat ext-common-sha.txt | tr -d '
 ' | cut -c1-7)
            if [ -n "$EXPECTED" ] && [ "$SHA" != "<unknown>" ] && [ "${SHA:0:7}" != "$EXPECTED" ]; then
              echo "::warning::Submodule SHA ($SHA) differs from pinned ($EXPECTED)"
            fi
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Extract Lidarr Plugins Branch Assemblies
        run: |
          # Extract assemblies from plugins branch Docker image (same as main CI)
          mkdir -p ext/Lidarr/_output/net8.0
          IMAGE="ghcr.io/hotio/lidarr:pr-plugins"
          echo "Pulling $IMAGE..."
          docker pull "$IMAGE"
          cid=$(docker create "$IMAGE")
          echo "Extracting assemblies from container..."
          docker cp "$cid:/app" ext/Lidarr/_extracted || docker cp "$cid:/opt/lidarr" ext/Lidarr/_extracted
          docker rm "$cid" >/dev/null
          find ext/Lidarr/_extracted -type f -name "*.dll" -exec cp {} ext/Lidarr/_output/net8.0 \;
          
          # Verify plugins branch API is present
          if ! strings ext/Lidarr/_output/net8.0/Lidarr.Core.dll | grep -q "IDownloadProtocol"; then
            echo "[ERROR] Assemblies do not expose IDownloadProtocol (plugins branch API)."
            exit 1
          fi
          echo "[OK] Plugins branch assemblies extracted successfully"
        shell: bash

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config: |
            paths-ignore:
              - ext/**
              - tests/**

      - name: Build
        run: |
          # Build main plugin with plugins branch assemblies
          # PluginPackagingDisable=true skips ILRepack during CodeQL (assemblies not available in library path)
          dotnet build Qobuzarr.csproj --configuration Release \
            -p:UsePluginsBranch=true \
            -p:PluginPackagingDisable=true \
            -p:RunAnalyzersDuringBuild=false \
            -p:EnableNETAnalyzers=false \
            -p:TreatWarningsAsErrors=false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
