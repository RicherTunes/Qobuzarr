name: CodeQL Security Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 3 AM

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true  # Non-blocking - requires GitHub Advanced Security (Code Scanning)
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: ['csharp']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Init Common submodule only
        shell: bash
        run: |
          git submodule sync -- ext/Lidarr.Plugin.Common
          git submodule update --init --depth=1 -- ext/Lidarr.Plugin.Common

      - name: Assert Common submodule initialized
        shell: bash
        run: |
          if [ ! -d "ext/Lidarr.Plugin.Common/scripts" ]; then
            echo "::error::FATAL: ext/Lidarr.Plugin.Common/scripts not found - submodule not initialized"
            exit 1
          fi
          SHA=$(git -C ext/Lidarr.Plugin.Common rev-parse --short HEAD 2>/dev/null || echo "<unknown>")
          echo "Common submodule initialized at $SHA"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract Lidarr assemblies (shared script)
        shell: bash
        run: bash scripts/extract-lidarr-assemblies.sh --mode minimal

      - name: Remove host FluentValidation to prevent version conflict
        shell: bash
        run: |
          # Common compiles against FluentValidation 11.x (NuGet/CPM) but the host
          # ships FluentValidation 9.5.4. Keeping the host DLL in the assembly probe
          # path causes CS1705 during build. Removing it lets NuGet resolution win.
          rm -f ext/Lidarr/_output/net8.0/FluentValidation.dll
          echo "Removed host FluentValidation.dll to prevent CS1705 version conflict"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config: |
            paths-ignore:
              - ext/**
              - tests/**

      - name: Restore
        run: dotnet restore Qobuzarr.csproj

      - name: Build
        run: |
          dotnet build Qobuzarr.csproj --configuration Release --no-restore \
            -p:PluginPackagingDisable=true \
            -p:RunAnalyzersDuringBuild=false \
            -p:EnableNETAnalyzers=false \
            -p:TreatWarningsAsErrors=false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
