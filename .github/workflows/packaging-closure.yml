name: Packaging Closure

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'plugin.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'plugin.json'

permissions:
  contents: read

env:
  DOTNET_VERSION: 8.0.x
  MINIMUM_LIDARR_VERSION: 2.13.2.4685

jobs:
  verify-package-closure:
    name: Verify Package Closure
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: false

    - name: Configure git auth for private submodules
      env:
        CI_PAT: ${{ secrets.CI_PAT }}
      run: |
        if [ -n "${CI_PAT}" ]; then
          git config --global url.https://x-access-token:${CI_PAT}@github.com/.insteadOf https://github.com/
          git submodule sync --recursive
          git submodule update --init --recursive
        fi

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Lidarr assemblies (plugins branch)
      run: |
        echo "Setting up Lidarr assemblies from plugins branch (Docker)..."
        set -e
        mkdir -p ext/Lidarr/_output/net6.0
        IMAGE="ghcr.io/hotio/lidarr:pr-plugins"
        echo "Pulling $IMAGE (with retry)"
        n=0
        until [ "$n" -ge 3 ]; do
          docker pull "$IMAGE" && break
          n=$((n+1))
          echo "Pull failed ($n). Retrying in 10s..." && sleep 10
        done
        cid=$(docker create "$IMAGE")
        echo "Extracting assemblies from container..."
        docker cp "$cid:/app" ext/Lidarr/_extracted || docker cp "$cid:/opt/lidarr" ext/Lidarr/_extracted
        docker rm "$cid" >/dev/null
        find ext/Lidarr/_extracted -type f -name "*.dll" -print -exec cp {} ext/Lidarr/_output/net6.0 \;

        if [ ! -f ext/Lidarr/_output/net6.0/Lidarr.dll ]; then
          echo "[ERROR] Missing Lidarr.dll after extraction."
          exit 1
        fi

    - name: Build Plugin
      run: |
        dotnet restore Qobuzarr.csproj
        dotnet build Qobuzarr.csproj \
          --configuration Release \
          --no-restore \
          -p:UsePluginsBranch=true \
          -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false -p:TreatWarningsAsErrors=false \
          -m:1

    - name: Create Plugin Package
      run: |
        mkdir -p package
        cp bin/Lidarr.Plugin.Qobuzarr.dll package/ 2>/dev/null || cp bin/Release/*/Lidarr.Plugin.Qobuzarr.dll package/
        cp plugin.json package/

        cd package
        zip -r ../Qobuzarr-closure-test.zip .
        cd ..

    - name: Verify Dependency Closure
      run: |
        set -euo pipefail

        zipfile="Qobuzarr-closure-test.zip"

        echo "=== Checking package closure ==="

        # List all DLLs in the package
        dlls=$(unzip -l "$zipfile" | grep '\.dll$' | awk '{print $4}' | xargs -I {} basename {})
        echo "DLLs in package: $dlls"

        # Allowed Lidarr.* assemblies (plugin-specific)
        allowed="Lidarr.Plugin.Qobuzarr.dll Lidarr.Plugin.Common.dll Lidarr.Plugin.Abstractions.dll"

        # Check for disallowed host assemblies
        disallowed=""
        for dll in $dlls; do
          if echo "$dll" | grep -qE '^Lidarr\.' && ! echo "$allowed" | grep -qw "$dll"; then
            disallowed="$disallowed $dll"
          fi
          # Also check for NzbDrone assemblies
          if echo "$dll" | grep -qE '^NzbDrone\.'; then
            disallowed="$disallowed $dll"
          fi
        done

        if [ -n "$disallowed" ]; then
          echo "ERROR: Disallowed host assemblies found:$disallowed" >&2
          echo "" >&2
          echo "These assemblies should be provided by the Lidarr runtime, not bundled with the plugin." >&2
          exit 1
        fi

        echo "Dependency closure OK. Assemblies: $dlls"

    - name: Upload Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qobuzarr-closure-test
        path: Qobuzarr-closure-test.zip
        retention-days: 3
