name: Gitleaks (PR/Push)

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar xz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        id: gitleaks
        run: |
          set +e
          gitleaks detect --no-banner --redact --source . --verbose --report-path gitleaks-results.sarif --report-format sarif
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 1 ]; then
            echo "LEAKS_FOUND=true" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::Gitleaks exited with unexpected code $EXIT_CODE"
          fi
          exit 0  # Don't fail the step - we handle exit in dedicated step

      - name: Show findings in log (quota-safe)
        if: steps.gitleaks.outputs.LEAKS_FOUND == 'true'
        run: |
          if [ -f gitleaks-results.sarif ]; then
            echo "::group::Gitleaks findings (SARIF)"
            cat gitleaks-results.sarif
            echo "::endgroup::"
          else
            echo "::warning::SARIF file not found despite leaks being detected"
          fi

      - name: Upload SARIF (best-effort)
        if: steps.gitleaks.outputs.LEAKS_FOUND == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results.sarif
          path: gitleaks-results.sarif
          retention-days: 3
          if-no-files-found: ignore

      - name: Fail if leaks found
        if: steps.gitleaks.outputs.LEAKS_FOUND == 'true'
        run: |
          echo "::error::Gitleaks found potential secrets. See 'Gitleaks findings' group above for details."
          exit 1
