name: Nightly

on:
  schedule:
    # Run at 6 AM UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  DOTNET_VERSION: 8.0.x
  MINIMUM_LIDARR_VERSION: 3.0.0.4855
  # Single source of truth for CI test filtering
  # Excludes: LiveIntegration (needs live Lidarr), Integration (needs assemblies),
  #           Performance (benchmarks), Quarantined (known issues),
  #           DockerE2E (needs a booted Lidarr container with the merged plugin
  #           mounted — covered by docker-e2e.yml; this broad sweep doesn't mount it).
  CI_TEST_FILTER: "Category!=LiveIntegration&Category!=Integration&Category!=Performance&Category!=Quarantined&Category!=DockerE2E"

jobs:
  nightly-tests:
    name: Nightly Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.dotnet-version }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        dotnet-version: ['8.0.x']

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Setup Lidarr assemblies (plugins branch)
      run: |
        echo "Setting up Lidarr assemblies from plugins branch (Docker)..."
        set -e
        mkdir -p ext/Lidarr/_output/net8.0
        IMAGE="ghcr.io/hotio/lidarr:pr-plugins-3.1.2.4913"
        echo "Pulling $IMAGE (with retry)"
        n=0
        until [ "$n" -ge 3 ]; do
          docker pull "$IMAGE" && break
          n=$((n+1))
          echo "Pull failed ($n). Retrying in 10s..." && sleep 10
        done
        cid=$(docker create "$IMAGE")
        echo "Extracting assemblies from container..."
        docker cp "$cid:/app" ext/Lidarr/_extracted || docker cp "$cid:/opt/lidarr" ext/Lidarr/_extracted
        docker rm "$cid" >/dev/null
        find ext/Lidarr/_extracted -type f -name "*.dll" -print -exec cp {} ext/Lidarr/_output/net8.0 \;

        if [ ! -f ext/Lidarr/_output/net8.0/Lidarr.dll ]; then
          echo "[ERROR] Missing Lidarr.dll after extraction."
          exit 1
        fi

        ls -la ext/Lidarr/_output/net8.0/ || true

    - name: Restore dependencies
      run: |
        dotnet restore Qobuzarr.sln

    - name: Build
      run: |
        dotnet build Qobuzarr.sln --configuration Release --no-restore \
          -p:UsePluginsBranch=true \
          -p:PluginPackagingDisable=true \
          -p:RunAnalyzersDuringBuild=false -p:EnableNETAnalyzers=false -p:TreatWarningsAsErrors=false

    - name: Run Tests
      run: |
        dotnet test Qobuzarr.sln \
          --no-build \
          --configuration Release \
          --settings tests/Full.runsettings \
          --verbosity normal \
          --filter "${{ env.CI_TEST_FILTER }}" \
          --logger "trx;LogFileName=nightly-${{ matrix.dotnet-version }}.trx" \
          --results-directory ./test-results/nightly-${{ matrix.dotnet-version }} \
          --blame-hang-timeout 120s \
          || true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: nightly-test-results-${{ matrix.dotnet-version }}
        path: |
          ./test-results/nightly-${{ matrix.dotnet-version }}/
          tests/TestResults/
        retention-days: 7
