name: Validate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '6.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Validate project structure
      run: |
        echo "🔍 Validating project structure..."
        
        # Check required files
        for file in Qobuzarr.csproj plugin.json Directory.Packages.props CLAUDE.md; do
          if [ -f "$file" ]; then
            echo "✅ $file exists"
          else
            echo "❌ $file missing"
            exit 1
          fi
        done
        
        # Check required directories
        for dir in src src/API src/Authentication src/Download src/Indexers src/Models src/Services; do
          if [ -d "$dir" ]; then
            echo "✅ $dir/ exists"
          else
            echo "❌ $dir/ missing"
            exit 1
          fi
        done
        
        echo "✅ Project structure validated!"

    - name: Check critical files
      run: |
        echo "🔍 Checking critical implementations..."
        
        # Check memory leak fix is present
        if grep -q "IDisposable" src/Download/Clients/QobuzDownloadItem.cs; then
          echo "✅ QobuzDownloadItem implements IDisposable (memory leak fix)"
        else
          echo "❌ QobuzDownloadItem missing IDisposable"
          exit 1
        fi
        
        # Check Protocol implementation
        if grep -q "nameof(QobuzarrDownloadProtocol)" src/Indexers/QobuzIndexer.cs; then
          echo "✅ QobuzIndexer has correct Protocol implementation"
        else
          echo "❌ QobuzIndexer missing correct Protocol"
          exit 1
        fi
        
        echo "✅ Critical implementations verified!"

    - name: Validate plugin.json
      run: |
        echo "🔍 Validating plugin.json..."
        python3 -m json.tool plugin.json > /dev/null
        echo "✅ plugin.json is valid JSON"
        
        # Extract and display version
        VERSION=$(cat plugin.json | python3 -c "import sys, json; print(json.load(sys.stdin)['version'])")
        echo "📦 Plugin version: $VERSION"

    - name: Count source files
      run: |
        echo "📊 Project statistics:"
        echo "  C# files: $(find src -name '*.cs' | wc -l)"
        echo "  Test files: $(find tests -name '*.cs' 2>/dev/null | wc -l || echo 0)"
        echo "  Total lines: $(find src -name '*.cs' -exec wc -l {} + | tail -1 | awk '{print $1}')"

    - name: Security check
      run: |
        echo "🔒 Running basic security checks..."
        
        # Check for hardcoded credentials
        if grep -r "password\s*=\s*\"" src/ --include="*.cs" | grep -v "// " | grep -v "password\": null"; then
          echo "⚠️ Warning: Possible hardcoded passwords found"
        else
          echo "✅ No hardcoded passwords detected"
        fi
        
        # Check for API keys
        if grep -r "api[_-]?key\s*=\s*\"" src/ --include="*.cs" | grep -v "// "; then
          echo "⚠️ Warning: Possible hardcoded API keys found"
        else
          echo "✅ No hardcoded API keys detected"
        fi

    - name: Summary
      run: |
        echo ""
        echo "════════════════════════════════════════"
        echo "✅ VALIDATION SUCCESSFUL"
        echo "════════════════════════════════════════"
        echo ""
        echo "Note: Full build requires local environment with Lidarr source."
        echo "This workflow validates code structure and critical fixes only."